            window.addEventListener('touchend', onTouchEnd, { passive: false });
            undoButton.addEventListener('click', undoLastMove);

        // --- Cleanup Grid Elements --- (Hide new UI elements)
        function cleanupGridElements() {
            console.log("Cleaning up grid elements...");

            timeLimitEnabled = false; startHalfFilled = false; animatingObjects = []; cancelHold();

            hidePreviewLine();

        // --- Update Grid --- (Unchanged)
        function updateGrid(gridSize) { cleanupGridElements(); currentGridSize = gridSize; CUBE_GRID_SIZE = gridSize - 1; BOX_GRID_SIZE = gridSize - 1; TOTAL_CUBES = Math.pow(CUBE_GRID_SIZE, 3); TOTAL_BOXES = 3 * Math.pow(BOX_GRID_SIZE, 2) * gridSize; console.log(`Updating grid to size: ${gridSize} (${TOTAL_CUBES} cubes, ${TOTAL_BOXES} boxes)`); gridCenter.set(SPACING*(gridSize-1)/2, SPACING*(gridSize-1)/2, SPACING*(gridSize-1)/2); const cameraZoffset = SPACING * gridSize * 0.8 + 2; camera.position.set(gridCenter.x, gridCenter.y + SPACING * (gridSize / 3), gridCenter.z + cameraZoffset); camera.lookAt(gridCenter); controls.target.copy(gridCenter); controls.update(); let minDist = Infinity; let maxDist = 0; const tempDotPositions = []; for (let z=0; z<gridSize; z++){for (let y=0; y<gridSize; y++){for (let x=0; x<gridSize; x++){ tempDotPositions.push(new THREE.Vector3(x*SPACING, y*SPACING, z*SPACING)); }}} tempDotPositions.forEach(pos => { const dist = camera.position.distanceTo(pos); minDist = Math.min(minDist, dist); maxDist = Math.max(maxDist, dist); }); BASE_FOG_NEAR = Math.max(0.1, minDist - SPACING * 0.5); BASE_FOG_FAR = BASE_FOG_NEAR + (maxDist - BASE_FOG_NEAR) / 0.8; initialCameraDist = camera.position.distanceTo(gridCenter); console.log(`Updated Fog: BaseNear=${BASE_FOG_NEAR.toFixed(2)}, BaseFar=${BASE_FOG_FAR.toFixed(2)}`); if(scene.fog){ scene.fog.near = BASE_FOG_NEAR; scene.fog.far = BASE_FOG_FAR; } else { scene.fog = new THREE.Fog(FOG_COLOR, BASE_FOG_NEAR, BASE_FOG_FAR); } createGrid(gridSize); createEdgesBoxesAndCubes(gridSize); createEdgeHitboxes(); createPreviewLine(); updateUI(); }

        // --- Helper: Create Soft Particle Texture --- (Unchanged)
        function createSoftParticleTexture() { const c=document.createElement('canvas'); const s=64; c.width=s; c.height=s; const x=c.getContext('2d'); const cx=s/2; const cy=s/2; const r=s/2; const g=x.createRadialGradient(cx,cy,0,cx,cy,r); g.addColorStop(0,'rgba(255,255,255,1)'); g.addColorStop(0.5,'rgba(255,255,255,0.5)'); g.addColorStop(1,'rgba(255,255,255,0)'); x.fillStyle=g; x.fillRect(0,0,s,s); const t=new THREE.CanvasTexture(c); t.needsUpdate=true; return t; }

        // --- Helper: Shuffle Array --- (Unchanged)
        function shuffleArray(array) { for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } }

        // --- Helper Functions (getDotIndex, getDotCoords, getEdgeId, getBoxId) --- (Unchanged)
        function getDotIndex(x, y, z) { if (x < 0 || x >= currentGridSize || y < 0 || y >= currentGridSize || z < 0 || z >= currentGridSize) return -1; return x + y * currentGridSize + z * currentGridSize * currentGridSize; }
        function getDotCoords(index) { const z = Math.floor(index / (currentGridSize * currentGridSize)); const y = Math.floor((index % (currentGridSize * currentGridSize)) / currentGridSize); const x = index % currentGridSize; return { x, y, z }; }
        function getEdgeId(idx1, idx2) { const [d1, d2] = [idx1, idx2].sort((a, b) => a - b); return `edge_${d1}_${d2}`; }
        function getBoxId(idx1, idx2, idx3, idx4) { const indices = [idx1, idx2, idx3, idx4].sort((a, b) => a - b); return `box_${indices[0]}_${indices[1]}_${indices[2]}_${indices[3]}`; }

        // --- Grid Creation --- (Unchanged)
        function createGrid(gridSize) { const g=new THREE.SphereGeometry(DOT_RADIUS,16,16); for(let z=0;z<gridSize;z++){for(let y=0;y<gridSize;y++){for(let x=0;x<gridSize;x++){ const d=new THREE.Mesh(g,dotMaterial); d.position.set(x*SPACING,y*SPACING,z*SPACING); const i=getDotIndex(x,y,z); d.userData={gridIndex:{x,y,z},index:i}; scene.add(d); dots[i]=d;}}} console.log(`Created ${dots.length} dots.`); }

        // --- Create Logical Edges, Boxes, and Cubes --- (Added adjacentCubes)
        function createEdgesBoxesAndCubes(gridSize) {
            const cubeGridSize = gridSize - 1;
            let cubeIdCounter = 0;
            boxes = {}; edges = {}; cubes = []; // Reset

            // Create Edges (same as before)
            for (let z=0; z<gridSize; z++){for(let y=0; y<gridSize; y++){for(let x=0; x<gridSize; x++){ const cIdx=getDotIndex(x,y,z); if(x<gridSize-1){const nIdx=getDotIndex(x+1,y,z); const eId=getEdgeId(cIdx,nIdx); if(!edges[eId]) edges[eId]={dot1Idx:cIdx,dot2Idx:nIdx,owner:null,mesh:null,boxes:[],cubes:[]};} if(y<gridSize-1){const nIdx=getDotIndex(x,y+1,z); const eId=getEdgeId(cIdx,nIdx); if(!edges[eId]) edges[eId]={dot1Idx:cIdx,dot2Idx:nIdx,owner:null,mesh:null,boxes:[],cubes:[]};} if(z<gridSize-1){const nIdx=getDotIndex(x,y,z+1); const eId=getEdgeId(cIdx,nIdx); if(!edges[eId]) edges[eId]={dot1Idx:cIdx,dot2Idx:nIdx,owner:null,mesh:null,boxes:[],cubes:[]};} }}}

            // Create Cubes and Boxes, linking edges/boxes/cubes
            for (let z=0; z<cubeGridSize; z++){for(let y=0; y<cubeGridSize; y++){for(let x=0; x<cubeGridSize; x++){

                            } // End if opponent owned
                        }); // End adjacent check loop
                        console.log(`--- Adjacent flip check finished for initial Cube ${initialCubeId}. Flipped ${flippedCubesInfo.length} cubes.`);

                        // 4. Finalize visuals & store undo info for this initial cube + its adjacent flips
                        setTimeout(() => shadeCube(cube), CUBE_SHADE_DELAY * index); // Shade initial cube with stagger
                        undoCubesCompleted.push({ id: initialCubeId, ownerBefore: ownerBefore, overriddenBoxes: overriddenBoxesInfo, flippedCubes: flippedCubesInfo });

                    } else {
                        // This case handles if edge completes CUBE A and CUBE B, and CUBE A's chain flips CUBE B before CUBE B's own loop executes.
                        console.warn(`Edge ${edgeId} completed Cube ${initialCubeId}, but it was already processed or owned? Owner: ${cube?.owner}`);
                    }
                }); // End loop through completedCubeIds
            }

            // --- Check for BOX completion ONLY IF NO cube was completed by this edge ---
            if (!cubeWasCompleted) {
                const completedBoxIds = checkPotentialBoxCompletion(edgeId);
                completedBoxIds.forEach(boxId => {
                    const box = boxes[boxId];
                    if (box && !box.owner) {
                        const ownerBefore = box.owner; // null
                        box.owner = playerBeforeMove;
                        scores[playerBeforeMove] += BOX_POINTS;
                        if (playerBeforeMove === 'Red') scoreDeltaRed += BOX_POINTS; else scoreDeltaBlue += BOX_POINTS;
                        createBoxPlane(box);
                        undoBoxesCompleted.push({ id: boxId, ownerBefore: ownerBefore });
                        console.log(`--- Box ${boxId} captured (+${BOX_POINTS} pt). Score: R ${scores.Red} - B ${scores.Blue}`);
                    }
                });
            }

            // Store move history
            const moveData = {
                edgeId: edgeId,
                playerWhoMoved: playerBeforeMove,
                timerValueBeforeMove: timerValueBeforeMove,
                scoreDeltaRed: scoreDeltaRed, // Net delta for the entire move
                scoreDeltaBlue: scoreDeltaBlue,
                boxesCompleted: undoBoxesCompleted,
                cubesCompleted: undoCubesCompleted // Array of completed cubes + their adjacent flips
            };
            moveHistory.push(moveData);
            undoButton.disabled = false;
            undoButton.style.display = 'block';
            console.log(">>> Move finished, Undo enabled. Final deltas: Red="+scoreDeltaRed+", Blue="+scoreDeltaBlue);

            // Finalize turn
            if (!checkGameOver()) {
                if (switchTurn) {
                    switchPlayer();
                } else {
                    console.log(`>>> ${playerBeforeMove} gets another turn.`);
                    resetTimer();
                    updateUI();
                }
            }
            // Allow next interaction
            const maxFade = Math.max(EDGE_FADE_DURATION, BOX_FADE_DURATION, GAS_FADE_DURATION);
            setTimeout(() => { turnMade = false; }, maxFade + 50);
        }

        // NEW Helper to remove box visual
        function removeBoxPlaneVisual(box) {
             if (box && box.mesh) {
                animatingObjects = animatingObjects.filter(obj => obj !== box.mesh);
                scene.remove(box.mesh);
                if(box.mesh.geometry) box.mesh.geometry.dispose();
                if(box.mesh.material) box.mesh.material.dispose();
                box.mesh = null;
            }
        }


        // --- Switch Player --- (Unchanged)
        function switchPlayer() { currentPlayer=(currentPlayer==='Red'?'Blue':'Red'); console.log(`>>> Turn switched to ${currentPlayer}`); resetTimer(); updateUI(); }

        // --- Get Winner Text --- (Unchanged)
        function getWinner() { if(!gameOver)return''; if(scores.Red>scores.Blue)return'<span class="player-red">Red</span>'; if(scores.Blue>scores.Red)return'<span class="player-blue">Blue</span>'; return'Nobody (Tie)'; }

        // --- Interaction Handlers (Universal Hold Logic - Unchanged) ---
        function handleInteractionStart(x, y) { if (!scene || !gameStarted || gameOver || turnMade || isHolding) return; let targetElement = null; try { targetElement = document.elementFromPoint(x, y); } catch (e) {} if (targetElement?.closest('#start-menu') || targetElement?.closest('#undo-button')) return; hidePreviewLine(); holdStartPosition.x = x; holdStartPosition.y = y; holdStartTime = Date.now(); holdEdgeId = null; interactionCoords.x = (x / window.innerWidth) * 2 - 1; interactionCoords.y = -(y / window.innerHeight) * 2 + 1; raycaster.setFromCamera(interactionCoords, camera); const intersects = raycaster.intersectObjects(edgeHitboxes); const hit = intersects.length > 0 ? intersects[0] : null; if (hit) { const edgeId = hit.object.userData.edgeId; const edge = edges[edgeId]; if (edge && !edge.owner && (hit.object.material.opacity > 0 || !isTouchDevice)) { holdEdgeId = edgeId; isHolding = true; updatePreviewLine(edgeId); previewEdgeMaterial.opacity = 0; previewEdgeMesh.visible = true; if (holdTimerId) clearTimeout(holdTimerId); holdTimerId = setTimeout(confirmHoldSelection, HOLD_DURATION); } } }
        function handleInteractionMove(x, y) { if (!isHolding || !holdEdgeId) return; const dx = x - holdStartPosition.x; const dy = y - holdStartPosition.y; const distSq = dx * dx + dy * dy; if (distSq > MAX_HOLD_MOVE_DISTANCE_SQ) { cancelHold(); } }
        function handleInteractionEnd() { if (isHolding) { cancelHold(); } }
        function cancelHold() { if (!isHolding) return; if (holdTimerId) { clearTimeout(holdTimerId); holdTimerId = null; } hidePreviewLine(); holdEdgeId = null; holdStartTime = 0; isHolding = false; holdStartPosition.x = null; holdStartPosition.y = null; }
        function confirmHoldSelection() { if (isHolding && holdEdgeId) { console.log("Hold confirmed for edge:", holdEdgeId); const edgeToClaim = holdEdgeId; holdTimerId = null; isHolding = false; holdEdgeId = null; holdStartTime = 0; holdStartPosition.x = null; holdStartPosition.y = null; claimEdge(edgeToClaim); } else { holdTimerId = null; isHolding = false; holdEdgeId = null; holdStartTime = 0; holdStartPosition.x = null; holdStartPosition.y = null; } }

        // --- Event Listeners --- (Reverted to Universal Hold - Unchanged)
        function onWindowResize() { if (camera && renderer) { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); } }
        function onMouseDown(event) { if (event.button !== 0) return; if (event.target.closest('#start-menu') || event.target.closest('#undo-button') || event.target.closest('#rules-button')) return; /* Added rules button check */ if (!gameStarted || gameOver || turnMade) return; handleInteractionStart(event.clientX, event.clientY); }
        function onMouseMove(event) { if (isHolding) { handleInteractionMove(event.clientX, event.clientY); } else if (!isTouchDevice) { if (!scene || !gameStarted || gameOver || turnMade) { hidePreviewLine(); return; } interactionCoords.x = (event.clientX / window.innerWidth) * 2 - 1; interactionCoords.y = -(event.clientY / window.innerHeight) * 2 + 1; raycaster.setFromCamera(interactionCoords, camera); const intersects = raycaster.intersectObjects(edgeHitboxes); let previewableEdgeId = null; for (const hit of intersects) { const edgeId = hit.object.userData.edgeId; const edge = edges[edgeId]; if (edge && !edge.owner) { previewableEdgeId = edgeId; break; } } if (previewableEdgeId) { if (currentPreviewEdgeId !== previewableEdgeId) { updatePreviewLine(previewableEdgeId); previewEdgeMaterial.opacity = MOUSE_PREVIEW_OPACITY; previewEdgeMesh.visible = true; currentPreviewEdgeId = previewableEdgeId; } } else { hidePreviewLine(); } } }
        function onMouseUp(event) { if (event.button !== 0) return; if (event.target.closest('#start-menu') || event.target.closest('#undo-button') || event.target.closest('#rules-button')) return; /* Added rules button check */ handleInteractionEnd(); }
        function onTouchStart(event) { if (event.touches.length === 1) { // Check if touch is on UI
            const touch = event.touches[0]; let targetElement = null; try { targetElement = document.elementFromPoint(touch.clientX, touch.clientY); } catch (e) {} if (targetElement?.closest('#start-menu') || targetElement?.closest('#undo-button') || targetElement?.closest('#rules-button')) return; handleInteractionStart(touch.clientX, touch.clientY); } else { cancelHold(); } }
        function onTouchMove(event) { if (event.touches.length === 1) { event.preventDefault(); handleInteractionMove(event.touches[0].clientX, event.touches[0].clientY); } else { cancelHold(); } }
        function onTouchEnd(event) { // Check if touch end is on UI (might not be needed depending on browser behavior)
            // let targetElement = null; try { targetElement = document.elementFromPoint(event.changedTouches[0].clientX, event.changedTouches[0].clientY); } catch (e) {} if (targetElement?.closest('#start-menu') || targetElement?.closest('#undo-button') || targetElement?.closest('#rules-button')) return;
            handleInteractionEnd(); }


        // --- Animation Loop --- (Updated for Particle Velocity/Bouncing)
        function animate() {
            requestAnimationFrame(animate);
            if (!scene || !camera || !renderer) return;

            controls.update();
            const now = Date.now();

            // Animate Hold Preview Opacity
            if (isHolding && holdEdgeId && previewEdgeMesh && previewEdgeMesh.visible) {
                 const elapsed = now - holdStartTime;
                 const progress = Math.min(elapsed / HOLD_DURATION, 1.0);
                 previewEdgeMaterial.opacity = progress;
            }

            // Process fade-in animations (Edges, Boxes, Gas)
            const stillAnimating = [];
            for (const obj of animatingObjects) {
                 const anim = obj.userData.animation;
                 if (!anim) continue;
                 const elapsed = now - anim.startTime;
                 const progress = Math.min(elapsed / anim.duration, 1.0);
                 if (obj.material) { obj.material.opacity = progress * anim.targetOpacity; }
                 else { console.warn("Animating object missing material"); continue; }
                 if (progress < 1.0) { stillAnimating.push(obj); }
                 else { if (obj.material) { obj.material.opacity = anim.targetOpacity; } delete obj.userData.animation; }
            }
            animatingObjects = stillAnimating;

            // Animate Gas Particles (Velocity + Bouncing)
            gasParticleSystems.forEach(points => {
                const positions = points.geometry.attributes.position.array;
                const velocities = points.userData.velocities; // Get velocities
                const basePos = points.userData.basePos;
                const maxPos = {
                    x: basePos.x + SPACING,
                    y: basePos.y + SPACING,
                    z: basePos.z + SPACING
                };

                if (!velocities) return; // Skip if velocities aren't set up yet

                for (let i = 0; i < positions.length; i += 3) {
                    // Update position based on velocity
                    positions[i]   += velocities[i];   // x += vx
                    positions[i+1] += velocities[i+1]; // y += vy
                    positions[i+2] += velocities[i+2]; // z += vz

                    // Boundary checks and bouncing
                    // X axis
                    if (positions[i] < basePos.x) {
                        positions[i] = basePos.x + (basePos.x - positions[i]); // Reflect position
                        velocities[i] *= -1; // Reverse velocity
                    } else if (positions[i] > maxPos.x) {
                        positions[i] = maxPos.x - (positions[i] - maxPos.x); // Reflect position
                        velocities[i] *= -1; // Reverse velocity
                    }
                    // Y axis
                    if (positions[i+1] < basePos.y) {
                        positions[i+1] = basePos.y + (basePos.y - positions[i+1]);
                        velocities[i+1] *= -1;
                    } else if (positions[i+1] > maxPos.y) {
                        positions[i+1] = maxPos.y - (positions[i+1] - maxPos.y);
                        velocities[i+1] *= -1;
                    }
                    // Z axis
                    if (positions[i+2] < basePos.z) {
                        positions[i+2] = basePos.z + (basePos.z - positions[i+2]);
                        velocities[i+2] *= -1;
                    } else if (positions[i+2] > maxPos.z) {
                        positions[i+2] = maxPos.z - (positions[i+2] - maxPos.z);
                        velocities[i+2] *= -1;
                    }
                }
                points.geometry.attributes.position.needsUpdate = true;
            });

            // Dynamic Fog Adjustment
            if (scene.fog) {
                const currentDist = camera.position.distanceTo(gridCenter);
                const distDiff = currentDist - initialCameraDist;
                const newNear = Math.max(0.1, BASE_FOG_NEAR + distDiff);
                const newFar = BASE_FOG_FAR + distDiff;
                if (newNear < newFar) { scene.fog.near = newNear; scene.fog.far = newFar; }
            }

            renderer.render(scene, camera);
        }

        // --- Menu Setup & Start Game --- (Show Rules Button)
        gridSizeSlider.addEventListener('input', (event) => { const newSize = parseInt(event.target.value, 10); gridSizeValueSpan.textContent = newSize; if (scene) { updateGrid(newSize); } });
        timeLimitSlider.addEventListener('input', (event) => { const selectedIndex = parseInt(event.target.value, 10); timeLimitValueSpan.textContent = timeLimitLabels[selectedIndex]; });
        startButton.addEventListener('click', (event) => {
            event.stopPropagation();
            startMenu.classList.add('hidden');
            // Show game UI elements
            redScoreDisplay.style.display = 'block';
            timerDisplay.style.display = 'block'; // Timer might still be hidden by updateUI if disabled
            blueScoreDisplay.style.display = 'block';
            undoButton.style.display = 'block'; // Show undo button
            rulesButton.style.display = 'inline-block'; // Show rules button
            gameOverMessage.style.display = 'none'; // Ensure game over message is hidden

            const selectedTimeIndex = parseInt(timeLimitSlider.value, 10);
            const selectedTime = timeLimitOptions[selectedTimeIndex];
            timeLimitEnabled = (selectedTime !== Infinity);
            currentGameTimerDuration = selectedTime;
            startHalfFilled = halfFilledCheckbox.checked;
            currentPlayer = Math.random() < 0.5 ? 'Red' : 'Blue';
            console.log("Starting player:", currentPlayer);
            if (startHalfFilled) { prepopulateGrid(); moveHistory = []; undoButton.disabled = true; console.log("Grid pre-populated."); } else { undoButton.disabled = true; }
            if (timeLimitEnabled) { /* timerDisplay shown above */ resetTimer(); console.log("Timer started."); } else { timerDisplay.style.display = 'none'; }

            gameStarted = true;
            updateUI();
            console.log(`Game started with grid size ${currentGridSize}`);
         });

        // --- Pre-populate Grid Function --- (Unchanged)
        function prepopulateGrid() { const allEdgeIds = Object.keys(edges); shuffleArray(allEdgeIds); let prepopPlayer = 'Red'; let edgesPlacedCount = 0; const maxEdgesToPlace = Math.floor(allEdgeIds.length * 0.55); console.log("Pre-populating grid..."); for (const edgeId of allEdgeIds) { if (edgesPlacedCount >= maxEdgesToPlace) break; const edge = edges[edgeId]; if (edge && !edge.owner) { edge.owner = prepopPlayer; const completesBox = checkPotentialBoxCompletion(edgeId).length > 0; const completesCube = checkPotentialCubeCompletion(edgeId).length > 0; if (!completesBox && !completesCube) { createEdgeLine(edge, true); const hitbox = edgeIdToHitboxMap[edgeId]; if (hitbox) { hitbox.visible = false; } edgesPlacedCount++; prepopPlayer = (prepopPlayer === 'Red' ? 'Blue' : 'Red'); } else { edge.owner = null; } } } console.log(`Pre-populated ${edgesPlacedCount} edges.`); updateUI(); }

        // --- Initial Setup ---
        setupScene();
        timeLimitValueSpan.textContent = timeLimitLabels[parseInt(timeLimitSlider.value, 10)];
        updateGrid(parseInt(gridSizeSlider.value, 10));
        animate();

    </script>
</body>
