<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KnowledgeBase AI</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tailwind CSS with Typography Plugin for beautiful Markdown -->
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Local Storage Library, Turndown (HTML-to-Markdown), and Marked (Markdown-to-HTML) -->
  <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
  <script src="https://unpkg.com/turndown/dist/turndown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const INITIAL_ENTRY = {
      id: 'sample-1',
      title: 'Welcome to your AI Knowledge Base',
      summary: 'A quick guide on how to use your new offline-first AI tool.',
      shortVersion: [
        'Drag and drop text or web links into the top-left drop zone.',
        'Everything saves automatically to your linked local file.',
        'Switch workspaces to manage different JSON files.',
        'Chat directly with your documents below.'
      ],
      fullContent: 'Welcome! This version runs entirely in your browser and syncs directly to a file on your hard drive.\n\n### Markdown Support\n* Use **Markdown** to edit your notes.\n* Drag and drop URLs; the scraper will automatically convert web pages into clean Markdown for you.',
      categories: ['Getting Started'],
      tags: ['Tutorial'],
      numericId: 1,
      createdAt: Date.now(),
      sourceUrl: null
    };

    const fetchAndScrubUrl = async (urlString) => {
      let html = '';
      try {
        const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(urlString)}`);
        const data = await response.json();
        if (data.contents) html = data.contents;
        else throw new Error("Invalid proxy response");
      } catch (err) {
        try {
          const response2 = await fetch(`https://corsproxy.io/?${encodeURIComponent(urlString)}`);
          if (!response2.ok) throw new Error("Network response failed");
          html = await response2.text();
        } catch (err2) {
          throw new Error("Scrape blocked. Falling back to search.");
        }
      }
      
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      
      let originalTitle = doc.querySelector('meta[property="og:title"]')?.getAttribute('content') || 
                          doc.querySelector('title')?.textContent || 
                          doc.querySelector('h1')?.textContent || 
                          "Untitled Page";
      originalTitle = originalTitle.trim();
      originalTitle = originalTitle.replace(/\s*[|•-]\s*([A-Za-z0-9 ]+Substack|[A-Za-z0-9 ]+Medium|[A-Za-z0-9 ]+Blog|[A-Za-z0-9 ]+HQ|QUT.*)$/i, '').trim();

      const unwanted = doc.querySelectorAll('script, style, noscript, iframe, svg, video, header, footer, nav, aside, form, .menu, .mega-menu, .global-nav, .navbar');
      unwanted.forEach(el => el.remove());
      
      let mainNode = doc.querySelector('.profile-details') || doc.querySelector('article') || doc.querySelector('main') || doc.body;
      
      const turndownService = new TurndownService({ headingStyle: 'atx', codeBlockStyle: 'fenced' });
      let markdownContent = turndownService.turndown(mainNode);
      
      if (!markdownContent || markdownContent.length < 50) throw new Error("No text found. Falling back to search.");
      return {
        title: originalTitle,
        content: markdownContent.substring(0, 50000)
      }; 
    };

    async function verifyPermission(fileHandle, readWrite) {
      const options = { mode: readWrite ? 'readwrite' : 'read' };
      if ((await fileHandle.queryPermission(options)) === 'granted') return true;
      if ((await fileHandle.requestPermission(options)) === 'granted') return true;
      return false;
    }

    const callGemini = async (key, payload, model) => {
      try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
        const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const result = await response.json();
        
        if (result.error) throw new Error(result.error.message);
        if (!result.candidates || result.candidates.length === 0) {
          const reason = result.promptFeedback?.blockReason || "Empty response from API";
          throw new Error(`AI rejected the prompt. Reason: ${reason}`);
        }
        
        return result;
      } catch (err) {
        throw err;
      }
    };

    function KnowledgeApp() {
      const [appState, setAppState] = useState('init'); 
      const [savedHandle, setSavedHandle] = useState(null);
      const [fileHandle, setFileHandle] = useState(null);
      const [fileName, setFileName] = useState('');
      
      const [entries, setEntries] = useState([]);
      const [chats, setChats] = useState({});
      const [apiKey, setApiKey] = useState('');
      const [model, setModel] = useState('gemini-3.1-flash-lite');
      
      const [showKeyModal, setShowKeyModal] = useState(false);
      const [tempKey, setTempKey] = useState('');
      const [tempModel, setTempModel] = useState('');
      
      const [activeCategories, setActiveCategories] = useState([]);
      const [activeTags, setActiveTags] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedEntryIds, setSelectedEntryIds] = useState([]);
      const [chatScope, setChatScope] = useState('selected'); // 'selected' or 'all'
      
      const [isEditing, setIsEditing] = useState(false);
      const [editData, setEditData] = useState({ title: '', summary: '', shortVersion: '', fullContent: '', categories: '', tags: '', sourceUrl: '' });

      const [isDragging, setIsDragging] = useState(false);
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [error, setError] = useState(null);
      
      const [chatInput, setChatInput] = useState('');
      const [isChatting, setIsChatting] = useState(false);
      const chatScrollRef = useRef(null);
      
      const [taxonomyInput, setTaxonomyInput] = useState('');
      const [isTaxonomyProcessing, setIsTaxonomyProcessing] = useState(false);

      useEffect(() => {
        idbKeyval.get('kb_file_handle').then(handle => {
          if (handle) setSavedHandle(handle);
          setAppState('landing');
        });
      }, []);

      useEffect(() => {
        if (appState !== 'workspace' || !fileHandle) return;
        const timer = setTimeout(async () => {
          try {
            const hasPerm = await verifyPermission(fileHandle, true);
            if (!hasPerm) return;
            const writable = await fileHandle.createWritable();
            await writable.write(JSON.stringify({ entries, chats, apiKey, model }, null, 2));
            await writable.close();
          } catch (err) {
            console.error("Auto-save failed:", err);
          }
        }, 1000);
        return () => clearTimeout(timer);
      }, [entries, chats, apiKey, model, appState, fileHandle]);

      const ensureNumericIds = (loadedEntries) => {
        let maxId = loadedEntries.reduce((max, e) => Math.max(max, e.numericId || 0), 0);
        return loadedEntries.map(e => {
          if (!e.numericId) {
            maxId += 1;
            return { ...e, numericId: maxId };
          }
          return e;
        });
      };

      const loadWorkspaceData = async (handle) => {
        try {
          const hasPerm = await verifyPermission(handle, true);
          if (!hasPerm) return;
          const file = await handle.getFile();
          const text = await file.text();
          let data = { entries: [], chats: {} };
          
          if (text.trim()) data = JSON.parse(text);
          
          if (data.entries?.length > 0) {
            const migrated = ensureNumericIds(data.entries);
            setEntries(migrated);
            setSelectedEntryIds([migrated[0].id]);
          } else {
            setEntries([INITIAL_ENTRY]);
            setSelectedEntryIds([INITIAL_ENTRY.id]);
          }
          
          if (data.chats) setChats(data.chats);
          if (data.apiKey) setApiKey(data.apiKey); else setApiKey('');
          if (data.model) setModel(data.model); else setModel('gemini-3.1-flash-lite');
          
          setFileHandle(handle);
          setFileName(file.name);
          await idbKeyval.set('kb_file_handle', handle);
          setAppState('workspace');
        } catch (err) {
          setError(`Failed to open workspace: ${err.message}`);
        }
      };

      const handleResume = () => loadWorkspaceData(savedHandle);

      const handleOpenFile = async () => {
        try {
          if (!window.showOpenFilePicker) throw new Error("API_NOT_SUPPORTED");
          const [handle] = await window.showOpenFilePicker({
            types: [{ description: 'JSON Files', accept: { 'application/json': ['.json'] } }]
          });
          await loadWorkspaceData(handle);
        } catch (err) {
          if (err.name !== 'AbortError') setError(`File error: ${err.message}`);
        }
      };

      const handleNewFile = async () => {
        try {
          if (!window.showSaveFilePicker) throw new Error("API_NOT_SUPPORTED");
          const handle = await window.showSaveFilePicker({
            suggestedName: 'my-knowledge-base.json',
            types: [{ description: 'JSON Files', accept: { 'application/json': ['.json'] } }]
          });
          setFileHandle(handle);
          setFileName(handle.name);
          setEntries([INITIAL_ENTRY]);
          setChats({});
          setApiKey('');
          setModel('gemini-3.1-flash-lite');
          setSelectedEntryIds([INITIAL_ENTRY.id]);
          await idbKeyval.set('kb_file_handle', handle);
          setAppState('workspace');
        } catch (err) {
           if (err.name !== 'AbortError') setError(`File error: ${err.message}`);
        }
      };
      
      const handleManualImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.entries) {
              const migrated = ensureNumericIds(data.entries);
              setEntries(migrated);
              if (migrated.length > 0) setSelectedEntryIds([migrated[0].id]);
            }
            if (data.chats) setChats(data.chats);
            if (data.apiKey) setApiKey(data.apiKey); else setApiKey('');
            if (data.model) setModel(data.model); else setModel('gemini-3.1-flash-lite');
            setFileName(file.name);
            setFileHandle(null);
            setAppState('workspace');
          } catch (err) {
            setError("Invalid JSON file.");
          }
        };
        reader.readAsText(file);
      };

      const handleCloseWorkspace = () => {
        setAppState('landing');
        setFileHandle(null);
        setEntries([]);
        setChats({});
        setApiKey('');
      };

      const allCategories = new Set();
      const allTags = new Set();
      entries.forEach(e => {
        if (Array.isArray(e.categories)) e.categories.forEach(c => allCategories.add(c));
        if (Array.isArray(e.tags)) e.tags.forEach(t => allTags.add(t));
      });

      const availableTags = new Set();
      entries.forEach(e => {
        const matchesCat = activeCategories.length === 0 || (Array.isArray(e.categories) && e.categories.some(c => activeCategories.includes(c)));
        if (matchesCat && Array.isArray(e.tags)) e.tags.forEach(t => availableTags.add(t));
      });

      const selectedEntries = entries.filter(e => selectedEntryIds.includes(e.id));
      const currentChatKey = chatScope === 'all' ? 'global_all' : selectedEntryIds.slice().sort().join(',');

      useEffect(() => {
        if (chatScrollRef.current) chatScrollRef.current.scrollTop = chatScrollRef.current.scrollHeight;
      }, [chats, currentChatKey, isChatting]);

      const handleDrop = async (e) => {
        e.preventDefault();
        setIsDragging(false);
        setError(null);
        
        const droppedData = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain');
        if (!droppedData) return;
        if (!apiKey) return setError("Please set your Gemini API key first (key icon top left).");

        setIsAnalyzing(true);
        try {
          const isUrl = /^https?:\/\/[^\s/$.?#].[^\s]*$/i.test(droppedData.trim());
          const sourceUrl = isUrl ? droppedData.trim() : null;
          let rawContent = droppedData;
          let originalWebTitle = null;
          let useSearchTool = false;

          const schema = {
            type: "OBJECT",
            properties: {
              title: { type: "STRING" },
              summary: { type: "STRING" },
              shortVersion: { type: "ARRAY", items: { type: "STRING" } },
              fullContent: { type: "STRING" },
              categories: { type: "ARRAY", items: { type: "STRING" } },
              tags: { type: "ARRAY", items: { type: "STRING" } }
            },
            required: ["title", "summary", "shortVersion", "fullContent", "categories", "tags"]
          };

          const taxonomyRules = `
          5. Categories: Assign 1-2 SUPER BROAD domain categories. Review these existing categories: ${JSON.stringify(Array.from(allCategories))}. ONLY reuse an existing category if it is a PERFECT fit. Create a new accurate domain if needed.
          6. Tags: Assign 3-5 highly specific concept tags. Include the author's name as a tag. Review existing tags: ${JSON.stringify(Array.from(allTags))}. ONLY reuse existing tags if they are highly relevant. Create new ones otherwise.`;
          
          const summaryRules = `4. fullContent string: Create an expanded summary. Succinctly summarize each point of the source, regardless of its length. Format with clean Markdown. Do NOT include any external links or 'Read more' text.`;

          let prompt = '';
          if (isUrl) {
            try {
              const scrapeResult = await fetchAndScrubUrl(droppedData.trim());
              rawContent = scrapeResult.content;
              originalWebTitle = scrapeResult.title;
              prompt = `Analyze this markdown text. Return strictly as JSON. 
              1. Title: Create a title for this piece (or use: "${originalWebTitle.replace(/"/g, '\\"')}"). 
              2. 1-2 sentence summary. Include author's name if identifiable. 
              3. 3-5 key points in 'shortVersion'.
              ${taxonomyRules}
              ${summaryRules}
              Content:\n${rawContent.substring(0, 40000)}`;
            } catch (err) {
              useSearchTool = true;
              prompt = `Use Google Search to find exact content for this URL: ${droppedData.trim()}. Return strictly as JSON. 
              1. Title. 2. Summary. Include author's name if identifiable. 3. 3-5 points in 'shortVersion'. 4. Reconstruct detailed fullContent strictly in Markdown. ${taxonomyRules}`;
            }
          } else {
             prompt = `Analyze this text. Return strictly as JSON. 1. Title. 2. Summary. 3. 3-5 points in 'shortVersion'. 4. Format the input text as clean Markdown as 'fullContent'. ${taxonomyRules}\nContent:\n${rawContent.substring(0, 40000)}`;
          }

          const payload = {
            contents: [{ role: 'user', parts: [{ text: prompt }] }],
            generationConfig: { responseMimeType: "application/json", responseSchema: schema }
          };
          if (useSearchTool) payload.tools = [{ google_search: {} }];

          const result = await callGemini(apiKey, payload, model);
          const parsedResult = JSON.parse(result.candidates[0].content.parts[0].text);
          const nextNumericId = entries.reduce((max, e) => Math.max(max, e.numericId || 0), 0) + 1;
          const newEntry = { 
            ...parsedResult, 
            title: originalWebTitle || parsedResult.title || 'Untitled Note',
            numericId: nextNumericId,
            id: 'entry-' + Date.now(), 
            createdAt: Date.now(),
            sourceUrl: sourceUrl 
          };
          
          setEntries(prev => [newEntry, ...prev]);
          setSelectedEntryIds([newEntry.id]);
          setActiveCategories([]);
          setActiveTags([]);
        } catch (err) {
          setError(err.message || "Failed to process content.");
        } finally {
          setIsAnalyzing(false);
        }
      };

      const handleEntryClick = (e, id) => {
        if (e.ctrlKey || e.metaKey) {
          setSelectedEntryIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
        } else {
          setSelectedEntryIds([id]);
        }
        setIsEditing(false);
      };

      const deleteEntry = (id) => {
        setEntries(prev => prev.filter(e => e.id !== id));
        setSelectedEntryIds(prev => prev.filter(i => i !== id));
        setIsEditing(false);
      };

      const handleNewNote = () => {
        const nextNumericId = entries.reduce((max, e) => Math.max(max, e.numericId || 0), 0) + 1;
        const newId = 'entry-' + Date.now();
        const newEntry = {
          id: newId, title: 'Untitled Note', numericId: nextNumericId, summary: '', shortVersion: [], fullContent: '',
          categories: [], tags: [], createdAt: Date.now(), sourceUrl: null
        };
        setEntries(prev => [newEntry, ...prev]);
        setSelectedEntryIds([newId]);
        setEditData({ title: '', summary: '', shortVersion: '', fullContent: '', categories: '', tags: '', sourceUrl: '' });
        setIsEditing(true);
      };

      const startEditing = (entry) => {
        setEditData({
          title: entry.title || '', summary: entry.summary || '', fullContent: entry.fullContent || '',
          shortVersion: (Array.isArray(entry.shortVersion) ? entry.shortVersion : []).join('\n'),
          categories: (Array.isArray(entry.categories) ? entry.categories : []).join(', '), 
          tags: (Array.isArray(entry.tags) ? entry.tags : []).join(', '), 
          sourceUrl: entry.sourceUrl || ''
        });
        setIsEditing(true);
      };

      const saveNote = () => {
        setEntries(prev => prev.map(e => {
          if (e.id === selectedEntryIds[0]) {
            return {
              ...e, title: editData.title || 'Untitled', summary: editData.summary, fullContent: editData.fullContent,
              shortVersion: editData.shortVersion.split('\n').map(s => s.trim()).filter(Boolean),
              sourceUrl: editData.sourceUrl || null,
              categories: editData.categories.split(',').map(s => s.trim()).filter(Boolean),
              tags: editData.tags.split(',').map(s => s.trim()).filter(Boolean)
            };
          }
          return e;
        }));
        setIsEditing(false);
      };

      const handleGenerateSummary = async () => {
        if (!apiKey) return setError("Set your API key first.");
        setIsAnalyzing(true);
        try {
          const prompt = `Analyze this note and write a 1-2 sentence summary. Return JSON: {"summary": "text"}.\nTitle: ${editData.title}\nContent: ${editData.fullContent}`;
          const payload = {
            contents: [{ role: 'user', parts: [{ text: prompt }] }],
            generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { summary: { type: "STRING" } } } }
          };
          const result = await callGemini(apiKey, payload, model);
          const data = JSON.parse(result.candidates[0].content.parts[0].text);
          setEditData(prev => ({ ...prev, summary: data.summary || prev.summary }));
        } catch(err) {
          setError("Summary generation failed: " + err.message);
        } finally {
          setIsAnalyzing(false);
        }
      };

      const handleGenerateTakeaways = async () => {
        if (!apiKey) return setError("Set your API key first.");
        setIsAnalyzing(true);
        try {
          const prompt = `Analyze this note. Extract 3-5 key points. Return JSON: {"shortVersion": ["point 1", "point 2"]}. Format each point in Markdown.\nTitle: ${editData.title}\nContent: ${editData.fullContent}`;
          const payload = {
            contents: [{ role: 'user', parts: [{ text: prompt }] }],
            generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { shortVersion: { type: "ARRAY", items: { type: "STRING" } } } } }
          };
          const result = await callGemini(apiKey, payload, model);
          const data = JSON.parse(result.candidates[0].content.parts[0].text);
          if (data.shortVersion && Array.isArray(data.shortVersion)) {
            setEditData(prev => ({ ...prev, shortVersion: data.shortVersion.join('\n') }));
          }
        } catch(err) {
          setError("Takeaway generation failed: " + err.message);
        } finally {
          setIsAnalyzing(false);
        }
      };

      const handleGenerateTaxonomies = async () => {
        if (!apiKey) return setError("Set your API key first.");
        setIsAnalyzing(true);
        try {
          const prompt = `Analyze this note. Return strictly JSON matching this schema: {"categories": ["Category"], "tags": ["tag1", "tag2"]}.
          Rules: 1. Categories: Assign 1-2 SUPER BROAD domain categories. Review existing: ${JSON.stringify(Array.from(allCategories))}. ONLY reuse if perfect match.
          2. Tags: Assign 3-5 highly specific concept keywords. Review existing: ${JSON.stringify(Array.from(allTags))}. ONLY reuse if highly relevant.
          Title: ${editData.title}\nContent: ${editData.fullContent}`;

          const payload = {
            contents: [{ role: 'user', parts: [{ text: prompt }] }],
            generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { categories: { type: "ARRAY", items: { type: "STRING" } }, tags: { type: "ARRAY", items: { type: "STRING" } } } } }
          };
          
          const result = await callGemini(apiKey, payload, model);
          const data = JSON.parse(result.candidates[0].content.parts[0].text);
          setEditData(prev => ({ 
            ...prev, 
            categories: Array.isArray(data.categories) ? data.categories.join(', ') : prev.categories, 
            tags: Array.isArray(data.tags) ? data.tags.join(', ') : prev.tags 
          }));
        } catch(err) {
          setError("Taxonomy generation failed: " + err.message);
        } finally {
          setIsAnalyzing(false);
        }
      };

      const handleTaxonomyCommand = async (e) => {
        e.preventDefault();
        if (!taxonomyInput.trim() || !apiKey) {
          if (!apiKey) setError("Set your API key first.");
          return;
        }

        setIsTaxonomyProcessing(true);
        try {
          const prompt = `You are a database taxonomy manager. The user wants to modify existing categories and tags.
          Current Categories: ${JSON.stringify(Array.from(allCategories))}
          Current Tags: ${JSON.stringify(Array.from(allTags))}
          Command: "${taxonomyInput}"

          Determine the exact replacements and deletions needed to fulfill the command.
          Return strictly as JSON matching this schema:
          {
            "categoryChanges": [{"old": "OldName", "new": "NewName"}],
            "categoryDeletions": ["NameToRemove"],
            "tagChanges": [{"old": "OldName", "new": "NewName"}],
            "tagDeletions": ["NameToRemove"]
          }`;

          const schema = {
            type: "OBJECT",
            properties: {
              categoryChanges: { type: "ARRAY", items: { type: "OBJECT", properties: { old: { type: "STRING" }, new: { type: "STRING" } } } },
              categoryDeletions: { type: "ARRAY", items: { type: "STRING" } },
              tagChanges: { type: "ARRAY", items: { type: "OBJECT", properties: { old: { type: "STRING" }, new: { type: "STRING" } } } },
              tagDeletions: { type: "ARRAY", items: { type: "STRING" } }
            }
          };

          const payload = {
            contents: [{ role: 'user', parts: [{ text: prompt }] }],
            generationConfig: { responseMimeType: "application/json", responseSchema: schema }
          };
          
          const result = await callGemini(apiKey, payload, model);
          const data = JSON.parse(result.candidates[0].content.parts[0].text);

          setEntries(prev => prev.map(entry => {
            let newCats = [...(Array.isArray(entry.categories) ? entry.categories : [])];
            let newTags = [...(Array.isArray(entry.tags) ? entry.tags : [])];

            if (data.categoryChanges) {
              data.categoryChanges.forEach(change => {
                if (newCats.includes(change.old)) {
                  newCats = newCats.filter(c => c !== change.old);
                  if (change.new && !newCats.includes(change.new)) newCats.push(change.new);
                }
              });
            }
            if (data.categoryDeletions) {
              newCats = newCats.filter(c => !data.categoryDeletions.includes(c));
            }

            if (data.tagChanges) {
              data.tagChanges.forEach(change => {
                if (newTags.includes(change.old)) {
                  newTags = newTags.filter(t => t !== change.old);
                  if (change.new && !newTags.includes(change.new)) newTags.push(change.new);
                }
              });
            }
            if (data.tagDeletions) {
              newTags = newTags.filter(t => !data.tagDeletions.includes(t));
            }

            return { ...entry, categories: newCats, tags: newTags };
          }));
          
          setTaxonomyInput('');
        } catch(err) {
          setError("Taxonomy update failed: " + err.message);
        } finally {
          setIsTaxonomyProcessing(false);
        }
      };

      const handleSendMessage = async (e) => {
        e.preventDefault();
        if (!chatInput.trim() || (!selectedEntryIds.length && chatScope === 'selected')) return;
        if (!apiKey) return setChats(prev => ({ ...prev, [currentChatKey]: [...(chats[currentChatKey] || []), { role: 'model', text: "⚠️ Please set your Gemini API key first." }] }));

        const userMessage = chatInput.trim();
        setChatInput('');
        setIsChatting(true);

        const currentHistory = chats[currentChatKey] || [];
        const updatedHistory = [...currentHistory, { role: 'user', text: userMessage }];
        setChats(prev => ({ ...prev, [currentChatKey]: updatedHistory }));

        const targetEntries = chatScope === 'all' ? entries : selectedEntries;
        const contextText = targetEntries.map(e => `Title: ${e.title}\nSummary: ${e.summary}\nContent: ${e.fullContent}`).join('\n\n---\n\n');

        try {
          const payload = {
            contents: [...currentHistory.map(msg => ({ role: msg.role, parts: [{ text: msg.text }] })), { role: 'user', parts: [{ text: userMessage }] }],
            systemInstruction: { parts: [{ text: `Answer strictly based on this document context. Context scope: ${chatScope}.\n\nDocuments:\n${contextText}` }] }
          };
          const result = await callGemini(apiKey, payload, model);
          setChats(prev => ({ ...prev, [currentChatKey]: [...updatedHistory, { role: 'model', text: result.candidates[0].content.parts[0].text }] }));
        } catch (err) {
          setChats(prev => ({ ...prev, [currentChatKey]: [...updatedHistory, { role: 'model', text: `⚠️ Error: ${err.message}` }] }));
        } finally {
          setIsChatting(false);
        }
      };

      const openSettings = () => {
        setTempKey(apiKey);
        setTempModel(model);
        setShowKeyModal(true);
      };

      const saveSettings = () => {
        setApiKey(tempKey);
        setModel(tempModel);
        setShowKeyModal(false);
      };

      if (appState === 'init') return <div className="flex h-screen items-center justify-center bg-slate-50"><i className="fa-solid fa-spinner fa-spin text-4xl text-indigo-600"></i></div>;

      if (appState === 'landing') {
        return (
          <div className="flex h-screen items-center justify-center bg-slate-50">
            <div className="bg-white p-10 rounded-2xl shadow-sm border border-slate-200 text-center max-w-md w-full relative">
              <i className="fa-solid fa-folder-tree text-5xl text-indigo-600 mb-6"></i>
              <h1 className="text-2xl font-bold text-slate-800 mb-2">Knowledge Workspaces</h1>
              <p className="text-slate-500 mb-8 text-sm">Select a local JSON file to start syncing your research.</p>
              <div className="space-y-3">
                {savedHandle && <button onClick={handleResume} className="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium transition-colors flex items-center justify-center"><i className="fa-solid fa-rotate-right mr-2"></i> Resume "{savedHandle.name}"</button>}
                <button onClick={handleOpenFile} className="w-full py-3 px-4 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 rounded-lg font-medium transition-colors flex items-center justify-center shadow-sm"><i className="fa-regular fa-folder-open mr-2"></i> Open Existing File</button>
                <button onClick={handleNewFile} className="w-full py-3 px-4 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 rounded-lg font-medium transition-colors flex items-center justify-center shadow-sm"><i className="fa-solid fa-plus mr-2"></i> Create New File</button>
                <div className="pt-4 border-t border-slate-100">
                  <label className="w-full py-2 px-4 text-slate-500 hover:text-indigo-600 text-sm font-medium transition-colors flex items-center justify-center cursor-pointer">
                    <i className="fa-solid fa-upload mr-2"></i> Manual Import (No Auto-sync)
                    <input type="file" accept=".json" className="hidden" onChange={handleManualImport} />
                  </label>
                </div>
              </div>
              {error && <p className="mt-4 text-sm text-red-500">{error}</p>}
            </div>
          </div>
        );
      }

      const filteredEntries = entries.filter(entry => {
        if (!entry) return false;
        const matchesCat = activeCategories.length === 0 || (Array.isArray(entry.categories) && entry.categories.some(c => activeCategories.includes(c)));
        const matchesTag = activeTags.length === 0 || (Array.isArray(entry.tags) && entry.tags.some(t => activeTags.includes(t)));
        const searchLower = searchQuery.toLowerCase();
        const matchesSearch = !searchQuery || 
                              (entry.title && entry.title.toLowerCase().includes(searchLower)) || 
                              (entry.summary && entry.summary.toLowerCase().includes(searchLower));
        return matchesCat && matchesTag && matchesSearch;
      });

      return (
        <div className="flex h-screen w-full bg-slate-50 text-slate-800 font-sans overflow-hidden">
          
          {showKeyModal && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50">
              <div className="bg-white p-6 rounded-xl shadow-lg w-96 border border-slate-200">
                <div className="flex items-center mb-4">
                  <i className="fa-solid fa-gear text-indigo-600 text-xl mr-3"></i>
                  <h3 className="text-lg font-bold text-slate-800">Workspace Settings</h3>
                </div>
                <div className="mb-4">
                  <label className="block text-xs font-semibold text-slate-500 mb-1">API Key</label>
                  <input type="password" value={tempKey} onChange={e => setTempKey(e.target.value)} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="AIzaSy..." />
                </div>
                <div className="mb-6">
                  <label className="block text-xs font-semibold text-slate-500 mb-1">AI Model</label>
                  <select value={tempModel} onChange={e => setTempModel(e.target.value)} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                    <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite</option>
                    <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                    <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                  </select>
                </div>
                <div className="flex justify-end gap-2">
                  <button onClick={() => setShowKeyModal(false)} className="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">Cancel</button>
                  <button onClick={saveSettings} className="px-4 py-2 text-sm font-medium bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors shadow-sm">Save</button>
                </div>
              </div>
            </div>
          )}

          {/* LEFT SIDEBAR */}
          <div className="w-72 flex-shrink-0 border-r border-slate-200 bg-white flex flex-col hidden md:flex">
            <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
               <div className="flex items-center text-xs font-semibold text-slate-600 truncate">
                 <i className="fa-solid fa-file-code mr-2 text-indigo-500"></i> <span className="truncate max-w-[120px]">{fileName}</span>
                 <button onClick={openSettings} className={`ml-2 px-1.5 py-0.5 rounded transition-colors flex-shrink-0 ${apiKey ? 'text-green-500 hover:bg-green-100' : 'text-slate-400 hover:bg-slate-200 hover:text-indigo-600'}`} title="Settings"><i className="fa-solid fa-gear"></i></button>
               </div>
               <button onClick={handleCloseWorkspace} className="text-xs text-slate-400 hover:text-slate-700 px-2 py-1 rounded hover:bg-slate-200 transition-colors flex-shrink-0" title="Switch Workspace"><i className="fa-solid fa-right-from-bracket"></i></button>
            </div>
            
            <div className="p-4 border-b border-slate-100">
              <div onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }} onDragLeave={() => setIsDragging(false)} onDrop={handleDrop} className={`relative flex flex-col items-center justify-center p-6 rounded-xl border-2 border-dashed transition-all text-center ${isDragging ? 'border-indigo-500 bg-indigo-50' : 'border-slate-300 bg-slate-50 hover:bg-slate-100'} ${isAnalyzing ? 'opacity-75 pointer-events-none' : ''}`}>
                {isAnalyzing ? <i className="fa-solid fa-circle-notch fa-spin text-3xl text-indigo-600 mb-2"></i> : <i className={`fa-solid fa-cloud-arrow-up text-3xl mb-2 ${isDragging ? 'text-indigo-600' : 'text-slate-400'}`}></i>}
                <h3 className="font-semibold text-sm mb-1">{isAnalyzing ? 'Analyzing...' : 'Add New Entry'}</h3>
                <p className="text-xs text-slate-500">Drag text or URL here</p>
              </div>
            </div>

            <div className="flex-1 overflow-y-auto p-4 space-y-6">
              <div>
                <div className="flex items-center text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Categories</div>
                <div className="flex flex-col space-y-1">
                  <button onClick={() => setActiveCategories([])} className={`text-left px-3 py-1.5 rounded-md text-sm ${activeCategories.length === 0 ? 'bg-indigo-50 text-indigo-700 font-medium' : 'text-slate-600 hover:bg-slate-100'}`}>All Categories</button>
                  {Array.from(allCategories).map(cat => (
                    <button key={cat} onClick={() => setActiveCategories(prev => prev.includes(cat) ? prev.filter(c => c !== cat) : [...prev, cat])} className={`text-left px-3 py-1.5 rounded-md text-sm ${activeCategories.includes(cat) ? 'bg-indigo-50 text-indigo-700 font-medium' : 'text-slate-600 hover:bg-slate-100'}`}>{cat}</button>
                  ))}
                </div>
              </div>
              <div>
                <div className="flex items-center text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Tags</div>
                <div className="flex flex-wrap gap-2">
                  <button onClick={() => setActiveTags([])} className={`px-3 py-1 rounded-full text-xs border ${activeTags.length === 0 ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white text-slate-600'}`}>All</button>
                  {Array.from(availableTags).map(tag => (
                    <button key={tag} onClick={() => setActiveTags(prev => prev.includes(tag) ? prev.filter(t => t !== tag) : [...prev, tag])} className={`px-3 py-1 rounded-full text-xs border ${activeTags.includes(tag) ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white text-slate-600'}`}>{tag}</button>
                  ))}
                </div>
              </div>
            </div>

            <div className="p-4 border-t border-slate-100 bg-slate-50">
              <div className="flex items-center text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">
                <i className="fa-solid fa-robot mr-1.5"></i> Manage Taxonomies
              </div>
              <form onSubmit={handleTaxonomyCommand} className="relative">
                <input 
                  type="text" 
                  value={taxonomyInput} 
                  onChange={(e) => setTaxonomyInput(e.target.value)} 
                  placeholder="Merge tags, rename..." 
                  className="w-full pl-3 pr-8 py-2 text-xs border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white"
                  disabled={isTaxonomyProcessing}
                />
                <button 
                  type="submit" 
                  disabled={isTaxonomyProcessing || !taxonomyInput.trim()} 
                  className="absolute right-2 top-2 text-indigo-600 hover:text-indigo-800 disabled:opacity-50 transition-colors"
                >
                  {isTaxonomyProcessing ? <i className="fa-solid fa-spinner fa-spin text-xs"></i> : <i className="fa-solid fa-wand-magic-sparkles text-xs"></i>}
                </button>
              </form>
            </div>

            <div className="p-3 border-t border-slate-100 bg-slate-50 text-center text-[10px] uppercase font-medium tracking-wider flex items-center justify-center">
              {fileHandle ? (
                <><div className="w-1.5 h-1.5 rounded-full bg-green-500 mr-2"></div> <span className="text-slate-400">Auto-saving enabled</span></>
              ) : (
                <button 
                  onClick={() => {
                    const dataStr = JSON.stringify({ entries, chats, apiKey, model }, null, 2);
                    const blob = new Blob([dataStr], { type: "application/json" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileName || 'knowledge-base-backup.json';
                    a.click();
                    URL.revokeObjectURL(url);
                  }}
                  className="text-indigo-600 hover:text-indigo-800 transition-colors flex items-center"
                >
                  <i className="fa-solid fa-download mr-2"></i> Manual Export
                </button>
              )}
            </div>
          </div>

          {/* MIDDLE COLUMN */}
          <div className="w-80 flex-shrink-0 border-r border-slate-200 bg-slate-50 flex flex-col hidden lg:flex">
            <div className="p-4 border-b border-slate-200 bg-white">
              <input type="text" placeholder="Search knowledge base..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500" />
              <button onClick={handleNewNote} className="w-full mt-3 py-2 bg-indigo-50 text-indigo-700 hover:bg-indigo-100 rounded-lg text-sm font-medium transition-colors flex items-center justify-center">
                <i className="fa-solid fa-plus mr-2"></i> New Note
              </button>
            </div>
            <div className="flex-1 overflow-y-auto p-3 space-y-2">
              <p className="text-xs text-slate-400 text-center mb-2">Cmd/Ctrl + Click to select multiple</p>
              {filteredEntries.map(entry => {
                const isSelected = selectedEntryIds.includes(entry.id);
                return (
                  <div key={entry.id} onClick={(e) => handleEntryClick(e, entry.id)} className={`p-4 rounded-xl cursor-pointer border ${isSelected ? 'bg-white border-indigo-200 shadow-sm ring-1 ring-indigo-500/10' : 'border-transparent hover:bg-white hover:border-slate-200'}`}>
                    <h4 className="text-sm font-semibold mb-1 line-clamp-2">
                      <span className="text-slate-400 font-normal mr-1">{entry.numericId}:</span>
                      {entry.title}
                    </h4>
                    <p className="text-xs text-slate-500 line-clamp-2 mb-2">{entry.summary}</p>
                  </div>
                );
              })}
            </div>
          </div>

          {/* MAIN CONTENT + CHAT WRAPPER */}
          <div className="flex-1 flex flex-col min-[1500px]:flex-row min-w-0 bg-white relative">
            {error && (
              <div className="absolute top-4 left-1/2 -translate-x-1/2 z-50 flex items-center bg-slate-800 text-white px-4 py-3 rounded-lg shadow-lg"><p className="text-sm mr-4">{error}</p><button onClick={() => setError(null)}><i className="fa-solid fa-xmark"></i></button></div>
            )}

            {/* CONTENT AREA */}
            <div className="flex-1 flex overflow-x-auto min-w-0">
              {!selectedEntryIds.length ? (
                <div className="flex-1 flex items-center justify-center text-slate-400 flex-col w-full"><i className="fa-solid fa-file-lines text-5xl mb-4 opacity-20"></i><p>Select an entry</p></div>
              ) : isEditing && selectedEntryIds.length === 1 ? (
                <div className="flex-1 overflow-y-auto w-full">
                  <div className="max-w-3xl mx-auto p-8 pb-32">
                    <div className="space-y-6">
                      <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold">Edit Note #{entries.find(e => e.id === selectedEntryIds[0])?.numericId}</h2>
                        <div className="flex gap-2">
                          <button onClick={() => setIsEditing(false)} className="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">Cancel</button>
                          <button onClick={saveNote} className="px-4 py-2 text-sm font-medium bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors">Save Note</button>
                        </div>
                      </div>
                      
                      <div>
                        <label className="block text-xs font-semibold text-slate-500 mb-1">Title</label>
                        <input type="text" value={editData.title} onChange={e => setEditData({...editData, title: e.target.value})} className="w-full px-4 py-2 text-lg font-bold border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Note Title" />
                      </div>

                      <div>
                        <div className="flex justify-between items-center mb-1">
                          <label className="block text-xs font-semibold text-slate-500">Summary</label>
                          <button type="button" onClick={handleGenerateSummary} disabled={isAnalyzing} className="text-xs font-semibold text-indigo-600 hover:text-indigo-800 disabled:opacity-50 transition-colors">
                            <i className="fa-solid fa-wand-magic-sparkles mr-1"></i> Generate
                          </button>
                        </div>
                        <input type="text" value={editData.summary} onChange={e => setEditData({...editData, summary: e.target.value})} className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Brief summary..." />
                      </div>

                      <div>
                        <div className="flex justify-between items-center mb-1">
                          <label className="block text-xs font-semibold text-slate-500">Key Takeaways (One per line)</label>
                          <button type="button" onClick={handleGenerateTakeaways} disabled={isAnalyzing} className="text-xs font-semibold text-indigo-600 hover:text-indigo-800 disabled:opacity-50 transition-colors">
                            <i className="fa-solid fa-wand-magic-sparkles mr-1"></i> Generate
                          </button>
                        </div>
                        <textarea value={editData.shortVersion} onChange={e => setEditData({...editData, shortVersion: e.target.value})} className="w-full h-32 px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-sm leading-relaxed" placeholder="Point 1&#10;Point 2..."></textarea>
                      </div>

                      <div>
                        <label className="block text-xs font-semibold text-slate-500 mb-1">Source URL</label>
                        <input type="text" value={editData.sourceUrl} onChange={e => setEditData({...editData, sourceUrl: e.target.value})} className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="https://example.com/source-url" />
                      </div>

                      <div className="p-4 bg-indigo-50 rounded-xl border border-indigo-100">
                        <div className="flex justify-between items-center mb-4">
                          <h3 className="text-sm font-bold text-indigo-900">Taxonomies</h3>
                          <button type="button" onClick={handleGenerateTaxonomies} disabled={isAnalyzing} className="px-3 py-1.5 bg-white border border-indigo-200 text-indigo-700 hover:bg-indigo-100 rounded-lg text-xs font-semibold transition-colors shadow-sm disabled:opacity-50">
                            {isAnalyzing ? <i className="fa-solid fa-spinner fa-spin mr-1"></i> : <i className="fa-solid fa-wand-magic-sparkles mr-1"></i>} Generate
                          </button>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                          <div>
                            <label className="block text-xs font-semibold text-indigo-500 mb-1">Categories (Comma separated)</label>
                            <input type="text" value={editData.categories} onChange={e => setEditData({...editData, categories: e.target.value})} className="w-full px-3 py-2 border border-indigo-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm bg-white" placeholder="Philosophy, Technology, Culture..." />
                          </div>
                          <div>
                            <label className="block text-xs font-semibold text-indigo-500 mb-1">Tags (Comma separated)</label>
                            <input type="text" value={editData.tags} onChange={e => setEditData({...editData, tags: e.target.value})} className="w-full px-3 py-2 border border-indigo-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm bg-white" placeholder="ai, research, guide..." />
                          </div>
                        </div>
                      </div>

                      <div>
                        <label className="block text-xs font-semibold text-slate-500 mb-1">Expanded Summary (Markdown)</label>
                        <textarea value={editData.fullContent} onChange={e => setEditData({...editData, fullContent: e.target.value})} className="w-full h-96 px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-sm leading-relaxed" placeholder="Start writing Expanded Summary in Markdown..."></textarea>
                      </div>
                    </div>
                  </div>
                </div>
              ) : (
                selectedEntries.map((entry) => (
                  <div key={entry.id} className="flex-1 min-w-[500px] border-r border-slate-100 last:border-r-0 overflow-y-auto">
                    <div className="max-w-3xl mx-auto p-8 pb-32">
                      <div className="flex justify-between items-start mb-6">
                        <div className="flex flex-wrap items-center gap-2">
                          {Array.isArray(entry.categories) && entry.categories.map(c => <span key={c} className="text-xs font-medium text-indigo-600 bg-indigo-50 px-2 py-1 rounded-md">{c}</span>)}
                          {Array.isArray(entry.tags) && entry.tags.map(t => <span key={t} className="text-xs font-medium text-slate-600 bg-slate-100 px-2 py-1 rounded-md">#{t}</span>)}
                          {entry.sourceUrl && <a href={entry.sourceUrl} target="_blank" rel="noopener noreferrer" className="text-xs font-semibold text-white bg-indigo-600 hover:bg-indigo-700 px-2.5 py-1 rounded-md flex items-center gap-1.5 transition-colors shadow-sm"><i className="fa-solid fa-arrow-up-right-from-square text-[10px]"></i> Source</a>}
                        </div>
                        {selectedEntryIds.length === 1 && (
                          <div className="flex gap-2">
                            <button onClick={() => startEditing(entry)} className="text-slate-400 hover:text-indigo-600 p-2 rounded hover:bg-indigo-50 transition-colors" title="Edit Note"><i className="fa-solid fa-pen"></i></button>
                            <button onClick={() => deleteEntry(entry.id)} className="text-slate-400 hover:text-red-500 p-2 rounded hover:bg-red-50 transition-colors" title="Delete Note"><i className="fa-solid fa-trash-can"></i></button>
                          </div>
                        )}
                      </div>
                      <h1 className="text-3xl font-bold mb-4">
                        <span className="text-slate-400 font-normal mr-2">{entry.numericId}:</span>
                        {entry.title || 'Untitled'}

                      <p className="text-lg text-slate-500 mb-8">{entry.summary}</p>
                      {Array.isArray(entry.shortVersion) && entry.shortVersion.length > 0 && (
                        <div className="bg-slate-50 rounded-xl p-6 mb-8 border border-slate-100">
                          <h3 className="text-sm font-bold uppercase text-slate-400 mb-4">Key Takeaways</h3>
                          <ul className="space-y-2">
                            {entry.shortVersion.map((point, idx) => (
                              <li key={idx} className="flex"><i className="fa-solid fa-chevron-right text-indigo-400 mt-1 mr-2 text-sm"></i><span className="text-slate-700 prose-a:text-indigo-600 prose-a:underline" dangerouslySetInnerHTML={{ __html: marked.parseInline(point) }}></span></li>

                          </ul>

                      <div className="prose prose-slate max-w-none text-slate-800" dangerouslySetInnerHTML={{ __html: marked.parse(entry.fullContent || '') }} />

                 <div className="flex bg-slate-200/60 p-1 rounded-lg m-4 mt-5">
                    <button onClick={() => setChatScope('selected')} className={`flex-1 text-xs py-1.5 rounded-md font-medium transition-colors ${chatScope === 'selected' ? 'bg-white shadow-sm text-indigo-700' : 'text-slate-500 hover:text-slate-700'}`}>Selected ({selectedEntryIds.length})</button>
                    <button onClick={() => setChatScope('all')} className={`flex-1 text-xs py-1.5 rounded-md font-medium transition-colors ${chatScope === 'all' ? 'bg-white shadow-sm text-indigo-700' : 'text-slate-500 hover:text-slate-700'}`}>All ({entries.length})</button>
                 </div>
                 
                 <div ref={chatScrollRef} className="flex-1 overflow-y-auto px-4 pb-4 space-y-4">
                    {chats[currentChatKey]?.map((msg, idx) => (
                      <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                        <div className={`max-w-[90%] rounded-2xl px-4 py-2 text-sm ${msg.role === 'user' ? 'bg-indigo-600 text-white rounded-br-none' : 'bg-white border border-slate-200 text-slate-800 rounded-bl-none shadow-sm'}`}>
                          {msg.text}
                        </div>
                      </div>
                    ))}
                    {isChatting && <div className="text-slate-400 text-sm italic ml-2">AI is typing...</div>}
                 </div>

                 <form onSubmit={handleSendMessage} className="p-4 bg-slate-100 border-t border-slate-200 relative shrink-0">
                    <input type="text" value={chatInput} onChange={(e) => setChatInput(e.target.value)} placeholder={`Query ${chatScope === 'all' ? 'entire knowledge base' : 'selected documents'}...`} className="w-full pl-4 pr-12 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 bg-white shadow-sm" />
                    <button type="submit" disabled={isChatting} className="absolute right-6 top-6 text-indigo-600 hover:text-indigo-800 disabled:opacity-50"><i className="fa-solid fa-paper-plane"></i></button>
                 </form>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<KnowledgeApp />);
  </script>
</body>
</html>
