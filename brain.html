<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KnowledgeBase AI</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Marked for Markdown Parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .prose a { color: #4f46e5; text-decoration: none; font-weight: 500; }
    .prose a:hover { text-decoration: underline; }
    .prose p { margin-bottom: 0.75em; }
    .prose ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 0.75em; }
    .prose h1, .prose h2, .prose h3 { font-weight: 600; margin-top: 1em; margin-bottom: 0.5em; color: #1e293b; }
  </style>
</head>
<body class="overflow-hidden text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const APP_VERSION = "v1.6.3";

    const INITIAL_ENTRY = {
      id: 'welcome-1',
      numericId: 1,
      title: 'Welcome to KnowledgeBase AI',
      shortVersion: 'Your intelligent, locally-synced knowledge assistant.',
      fullContent: `Welcome! This version (${APP_VERSION}) runs entirely in your browser.\n\n### Getting Started\n* Use **Markdown** to edit your notes.\n* Drag and drop URLs or paste them in the top left.\n* The AI will automatically summarize YouTube videos, PDFs, and web articles.\n* Drag any entry card into the text of another entry to create an inline reference!\n\nClick the **Manual** button in the sidebar for more details.`,
      categories: ['getting started'],
      tags: ['tutorial'],
      sourceUrl: null,
      createdAt: Date.now(),
      pinned: true
    };

    // --- HELPER FUNCTIONS ---
    const isMediaSource = (url) => {
      if (!url) return false;
      return /(youtube\.com|youtu\.be|vimeo\.com|tiktok\.com|twitch\.tv|spotify\.com|soundcloud\.com|\.mp4|\.mp3|\.wav)/i.test(url);
    };

    const isPdfSource = (url) => {
      if (!url) return false;
      return /\.pdf$/i.test(url);
    };

    const getCardBorderClass = (url) => {
      if (isPdfSource(url)) return 'border-4 border-blue-600';
      if (isMediaSource(url)) return 'border-4 border-red-600';
      return 'border border-slate-200 hover:border-indigo-300';
    };

    const normalizeTaxonomy = (items) => {
      if (!Array.isArray(items)) return [];
      return [...new Set(items.map(i => i.toLowerCase().trim()))].filter(Boolean);
    };

    // --- MAIN APP COMPONENT ---
    const App = () => {
      const [entries, setEntries] = React.useState([INITIAL_ENTRY]);
      const [selectedIds, setSelectedIds] = React.useState(['welcome-1']);
      const [editIds, setEditIds] = React.useState([]);
      const [chats, setChats] = React.useState({});
      const [apiKey, setApiKey] = React.useState(localStorage.getItem('kb_api_key') || '');
      const [showSettings, setShowSettings] = React.useState(false);
      const [showManual, setShowManual] = React.useState(false);
      const [isProcessing, setIsProcessing] = React.useState(false);
      const [manualInput, setManualInput] = React.useState('');
      const [searchQuery, setSearchQuery] = React.useState('');

      // Auto-save logic
      React.useEffect(() => {
        if (apiKey) localStorage.setItem('kb_api_key', apiKey);
      }, [apiKey]);

      const categoriesCount = {};
      const tagsCount = {};
      entries.forEach(e => {
        (e.categories || []).forEach(c => categoriesCount[c] = (categoriesCount[c] || 0) + 1);
        (e.tags || []).forEach(t => tagsCount[t] = (tagsCount[t] || 0) + 1);
      });
      const sortedCategories = Object.keys(categoriesCount).sort();
      const sortedTags = Object.keys(tagsCount).sort();

      const filteredEntries = entries.filter(e => 
        e.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
        (e.shortVersion && e.shortVersion.toLowerCase().includes(searchQuery.toLowerCase()))
      ).sort((a, b) => (b.pinned === a.pinned) ? b.createdAt - a.createdAt : (b.pinned ? 1 : -1));

      const callGemini = async (prompt, systemInstruction = null) => {
        if (!apiKey) throw new Error("API Key required");
        const payload = {
          contents: [{ role: "user", parts: [{ text: prompt }] }],
          generationConfig: { maxOutputTokens: 2048, temperature: 0.4 }
        };
        if (systemInstruction) {
          payload.systemInstruction = { parts: [{ text: systemInstruction }] };
        }
        
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        return data.candidates[0].content.parts[0].text;
      };

      const processNewSource = async (input) => {
        if (!apiKey) return alert("Please set your Gemini API key in settings first.");
        setIsProcessing(true);
        try {
          const isUrl = /^https?:\/\/[^\s/$.?#].[^\s]*$/i.test(input.trim());
          let prompt = `Analyze this input and summarize it. Return strictly JSON matching: {"title": "Title", "summary": "1 paragraph", "shortVersion": "3 bullets", "fullContent": "Detailed markdown", "categories": ["broad domain"], "tags": ["specific concept"]}. Make taxonomies lowercase.`;
          
          if (isUrl) {
            prompt += `\n\nExtract and summarize this URL: ${input.trim()}`;
            if (isMediaSource(input)) prompt += `\n(This is a media/video URL. Focus on identifying the creator and general expected topic if metadata isn't fully scrapable).`;
            if (isPdfSource(input)) prompt += `\n(This is a PDF document).`;
          } else {
            prompt += `\n\nContent: ${input}`;
          }

          const responseText = await callGemini(prompt);
          // Clean JSON markdown block if present
          const cleanJson = responseText.replace(/```json\n?|\n?```/g, '').trim();
          const parsed = JSON.parse(cleanJson);

          const nextNumId = entries.reduce((max, e) => Math.max(max, e.numericId || 0), 0) + 1;
          const newEntry = {
            id: `entry-${Date.now()}`,
            numericId: nextNumId,
            ...parsed,
            categories: normalizeTaxonomy(parsed.categories),
            tags: normalizeTaxonomy(parsed.tags),
            sourceUrl: isUrl ? input.trim() : null,
            createdAt: Date.now(),
            pinned: false
          };

          setEntries(prev => [newEntry, ...prev]);
          // Open to the right without closing current
          setSelectedIds(prev => [...new Set([...prev, newEntry.id])]);
          setManualInput('');
        } catch (err) {
          console.error(err);
          alert("Error processing input: " + err.message);
        } finally {
          setIsProcessing(false);
        }
      };

      const handleInputSubmit = (e) => {
        if (e.key === 'Enter' && manualInput.trim()) {
          processNewSource(manualInput);
        }
      };

      const togglePin = (id) => {
        setEntries(prev => prev.map(e => e.id === id ? { ...e, pinned: !e.pinned } : e));
      };

      const toggleEditMode = (id) => {
        setEditIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
      };

      const closeEntry = (id) => {
        setSelectedIds(prev => prev.filter(i => i !== id));
        setEditIds(prev => prev.filter(i => i !== id));
      };

      const updateEntry = (id, updates) => {
        setEntries(prev => prev.map(e => e.id === id ? { ...e, ...updates } : e));
      };

      return (
        <div className="flex h-screen w-full bg-slate-50 overflow-hidden">
          
          {/* LEFT SIDEBAR */}
          <div className="w-64 flex-shrink-0 bg-white border-r border-slate-200 flex flex-col h-full z-10 shadow-sm">
            <div className="p-4 border-b border-slate-100 flex items-center justify-between">
              <h1 className="font-bold text-lg text-slate-800 tracking-tight"><i className="fa-solid fa-brain text-indigo-600 mr-2"></i> KB AI</h1>
              <div className="flex gap-2">
                <button onClick={() => setShowManual(true)} className="text-slate-400 hover:text-indigo-600 transition-colors" title="Manual"><i className="fa-solid fa-book"></i></button>
                <button onClick={() => setShowSettings(true)} className="text-slate-400 hover:text-indigo-600 transition-colors" title="Settings"><i className="fa-solid fa-gear"></i></button>
              </div>
            </div>

            <div className="flex-1 overflow-y-auto p-4 hide-scrollbar space-y-6">
              <div>
                <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Categories</h3>
                <div className="flex flex-col gap-1.5">
                  {sortedCategories.map(c => (
                    <div key={c} className="flex justify-between items-center group cursor-pointer">
                      <span className="text-sm font-medium text-slate-600 group-hover:text-indigo-600 lowercase">{c}</span>
                      <span className="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded-full">{categoriesCount[c]}</span>
                    </div>
                  ))}
                </div>
              </div>

              <div>
                <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Tags</h3>
                <div className="flex flex-wrap gap-1.5">
                  {sortedTags.map(t => (
                    <span key={t} className="px-2 py-1 bg-indigo-50 border border-indigo-100 text-indigo-700 text-[10px] font-medium lowercase rounded-full">
                      {t} <span className="opacity-60 ml-0.5">({tagsCount[t]})</span>
                    </span>
                  ))}
                </div>
              </div>
            </div>
            
            {/* Status Bar */}
            <div className="p-3 border-t border-slate-200 bg-slate-50 text-[10px] text-slate-400 flex justify-between items-center">
              <span><i className="fa-solid fa-check-circle text-green-500 mr-1"></i> System Active</span>
              <span className="font-mono">{APP_VERSION}</span>
            </div>
          </div>

          {}
          <div className="w-80 flex-shrink-0 border-r border-slate-200 bg-slate-50/50 flex flex-col h-full">
            <div className="p-4 border-b border-slate-200 bg-white space-y-3">
              <div className="relative">
                <i className="fa-solid fa-search absolute left-3 top-2.5 text-slate-400 text-sm"></i>
                <input 
                  type="text" 
                  placeholder="Search knowledge..." 
                  value={searchQuery}
                  onChange={e => setSearchQuery(e.target.value)}
                  className="w-full pl-9 pr-3 py-2 bg-slate-100 border-none rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                />
              </div>
              <div className="relative">
                <i className="fa-solid fa-link absolute left-3 top-2.5 text-slate-400 text-sm"></i>
                <input 
                  type="text" 
                  placeholder="Paste URL, PDF link, or text..." 
                  value={manualInput}
                  onChange={e => setManualInput(e.target.value)}
                  onKeyDown={handleInputSubmit}
                  disabled={isProcessing}
                  className="w-full pl-9 pr-3 py-2 bg-indigo-50 border-none text-indigo-900 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none placeholder-indigo-300"
                />
                {isProcessing && <i className="fa-solid fa-spinner fa-spin absolute right-3 top-2.5 text-indigo-500 text-sm"></i>}
              </div>
            </div>

            <div className="flex-1 overflow-y-auto p-3 space-y-3 hide-scrollbar">
              {filteredEntries.map(entry => {
                const isSelected = selectedIds.includes(entry.id);
                const borderClass = getCardBorderClass(entry.sourceUrl);
                
                return (
                  <div 
                    key={entry.id}
                    onClick={() => setSelectedIds(prev => prev.includes(entry.id) ? prev : [...prev, entry.id])}
                    draggable
                    onDragStart={(e) => {
                      // Allow dropping as a shortcode native string
                      e.dataTransfer.setData("text/plain", `[[kb-ref:${entry.numericId}]]`);
                    }}
                    className={`${borderClass} bg-white shadow-sm rounded-xl p-4 cursor-pointer relative transition-all ${isSelected ? 'ring-2 ring-indigo-500 shadow-md transform scale-[1.02]' : 'hover:shadow-md hover:border-indigo-300'}`}
                  >
                    <div className="flex justify-between items-start mb-2 gap-2">
                      <h3 className="font-semibold text-slate-800 text-sm leading-tight flex-1">
                        <span className="text-slate-400 font-normal mr-1">{entry.numericId}:</span>
                        {entry.title}
                      </h3>
                      <button onClick={(e) => { e.stopPropagation(); togglePin(entry.id); }} className="flex-shrink-0 mt-0.5">
                        <i className={`fa-solid fa-thumbtack transition-opacity ${entry.pinned ? 'text-indigo-600 opacity-100' : 'text-slate-400 opacity-15 hover:opacity-100'}`}></i>
                      </button>
                    </div>
                    
                    {entry.categories && entry.categories.length > 0 && (
                      <div className="flex flex-wrap gap-1 mb-2">
                        {entry.categories.map(c => (
                          <span key={c} className="px-2 py-0.5 bg-indigo-50 text-indigo-600 rounded-full text-[10px] font-medium lowercase">{c}</span>
                        ))}
                      </div>
                    )}
                    
                    <p className="text-xs text-slate-500 line-clamp-2">{entry.shortVersion}</p>
                  </div>
                );
              })}
            </div>
          </div>

          {}
          <div className="flex-1 flex overflow-x-auto bg-slate-200/50 hide-scrollbar p-4 gap-4 items-start">
            {selectedIds.length === 0 ? (
              <div className="m-auto text-center text-slate-400 space-y-4">
                <i className="fa-solid fa-layer-group text-4xl mb-2 opacity-50"></i>
                <p>Select an entry to view or edit.</p>
              </div>
            ) : (
              selectedIds.map(id => {
                const entry = entries.find(e => e.id === id);
                if (!entry) return null;
                const isEditing = editIds.includes(id);

                return (
                  <div key={id} className="bg-white rounded-2xl shadow-lg flex flex-col flex-shrink-0 w-[600px] h-full max-h-full overflow-hidden border border-slate-200 relative">
                    
                    {/* Header */}
                    <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-white z-10">
                      <div className="flex items-center gap-2">
                        <span className="bg-slate-100 text-slate-500 text-xs font-bold px-2 py-1 rounded-md">{entry.numericId}</span>
                        <div className="text-xs text-slate-400 font-medium">
                          {new Date(entry.createdAt).toLocaleDateString()}
                        </div>
                      </div>
                      <div className="flex gap-2">
                        <button onClick={() => toggleEditMode(id)} className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors ${isEditing ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                          {isEditing ? 'Done Editing' : 'Edit'}
                        </button>
                        <button onClick={() => closeEntry(id)} className="w-8 h-8 rounded-lg bg-red-50 text-red-500 hover:bg-red-100 flex items-center justify-center transition-colors">
                          <i className="fa-solid fa-xmark"></i>
                        </button>
                      </div>
                    </div>

                    {/* Content Area */}
                    <div className="flex-1 overflow-y-auto hide-scrollbar relative">
                      {isEditing ? (
                        <div className="p-6 space-y-4">
                          <input 
                            value={entry.title} 
                            onChange={e => updateEntry(id, { title: e.target.value })} 
                            className="w-full text-2xl font-bold bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800"
                          />
                          <input 
                            value={entry.sourceUrl || ''} 
                            onChange={e => updateEntry(id, { sourceUrl: e.target.value })} 
                            placeholder="Source URL (e.g. YouTube, PDF link)"
                            className="w-full text-sm bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-indigo-600"
                          />
                          <textarea 
                            value={entry.fullContent}
                            onChange={e => updateEntry(id, { fullContent: e.target.value })}
                            className="w-full h-96 bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-sm resize-none"
                          />
                          {/* Taxonomy Editors */}
                          <div className="grid grid-cols-2 gap-4">
                            <div>
                              <label className="text-xs font-bold text-slate-500 uppercase mb-2 block">Categories (comma sep)</label>
                              <input 
                                value={(entry.categories || []).join(', ')}
                                onChange={e => updateEntry(id, { categories: normalizeTaxonomy(e.target.value.split(',')) })}
                                className="w-full text-sm bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 lowercase"
                              />
                            </div>
                            <div>
                              <label className="text-xs font-bold text-slate-500 uppercase mb-2 block">Tags (comma sep)</label>
                              <input 
                                value={(entry.tags || []).join(', ')}
                                onChange={e => updateEntry(id, { tags: normalizeTaxonomy(e.target.value.split(',')) })}
                                className="w-full text-sm bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 lowercase"
                              />
                            </div>
                          </div>
                        </div>
                      ) : (
                        <div className="p-8 pb-32">
                          <div className="flex flex-wrap gap-2 mb-4">
                            {entry.categories?.map(c => <span key={c} className="text-[10px] font-bold uppercase text-indigo-600 bg-indigo-50 px-2 py-1 rounded-md">{c}</span>)}
                            {entry.tags?.map(t => <span key={t} className="text-[10px] font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded-md lowercase">#{t}</span>)}
                            {entry.sourceUrl && (
                              <a href={entry.sourceUrl} target="_blank" className="text-[10px] font-bold text-white bg-indigo-600 px-2 py-1 rounded-md hover:bg-indigo-700 ml-auto">
                                <i className="fa-solid fa-arrow-up-right-from-square mr-1"></i> Source
                              </a>
                            )}
                          </div>
                          
                          <h1 className="text-3xl font-bold text-slate-900 mb-6 leading-tight">{entry.title}</h1>
                          
                          <div 
                            className="prose prose-slate max-w-none text-slate-700"
                            dangerouslySetInnerHTML={{ __html: marked.parse(entry.fullContent || '*No content*') }}
                          />

                          {/* Render Inline References (Look for [[kb-ref:ID]]) */}
                          <div className="mt-10 pt-6 border-t border-slate-200">
                             <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">Linked References</h4>
                             <div className="space-y-3">
                               {(() => {
                                  const refs = [...(entry.fullContent.matchAll(/\[\[kb-ref:(\d+)\]\]/g) || [])];
                                  const refIds = [...new Set(refs.map(r => parseInt(r[1])))];
                                  if (refIds.length === 0) return <p className="text-xs text-slate-400">No references. Drag a card into the edit window to link it.</p>;
                                  
                                  return refIds.map(numId => {
                                    const refEntry = entries.find(e => e.numericId === numId);
                                    if (!refEntry) return null;
                                    return (
                                      <div key={numId} onClick={() => setSelectedIds(prev => [...new Set([...prev, refEntry.id])])} className={`${getCardBorderClass(refEntry.sourceUrl)} bg-slate-50 p-3 rounded-xl cursor-pointer hover:shadow-md flex items-center gap-3`}>
                                        <div className="w-8 h-8 rounded-full bg-white flex items-center justify-center text-xs font-bold text-slate-400 shadow-sm">{refEntry.numericId}</div>
                                        <div>
                                          <h5 className="text-sm font-bold text-slate-800">{refEntry.title}</h5>
                                          <p className="text-xs text-slate-500 line-clamp-1">{refEntry.shortVersion}</p>
                                        </div>
                                      </div>
                                    )
                                  });
                               })()}
                             </div>
                          </div>
                        </div>
                      )}
                    </div>

                    {/* Chat Input at Bottom (Only in view mode) */}
                    {!isEditing && (
                      <div className="absolute bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
                        <div className="relative">
                          <input 
                            type="text" 
                            placeholder="Chat with this note & its references..." 
                            onKeyDown={async (e) => {
                              if (e.key === 'Enter' && e.target.value.trim() && !isProcessing) {
                                const msg = e.target.value;
                                e.target.value = '';
                                setIsProcessing(true);
                                try {
                                  // Context gathering logic
                                  const refs = [...(entry.fullContent.matchAll(/\[\[kb-ref:(\d+)\]\]/g) || [])];
                                  const refIds = [...new Set(refs.map(r => parseInt(r[1])))];
                                  const refEntries = refIds.map(nId => entries.find(en => en.numericId === nId)).filter(Boolean);
                                  
                                  let context = `DOCUMENT: ${entry.title}\nCONTENT: ${entry.fullContent}\n\n`;
                                  if (refEntries.length > 0) {
                                    context += `REFERENCED DOCUMENTS:\n`;
                                    refEntries.forEach(re => context += `- ${re.title}: ${re.fullContent}\n`);
                                  }

                                  const prompt = `Context:\n${context}\n\nUser Question: ${msg}`;
                                  const system = `You are a helpful knowledge base assistant. Answer the user's question using ONLY the provided document context. Keep your response under 100 words unless explicitly asked for more. Append "\n\n— ${APP_VERSION}" at the end of your response. Format using Markdown.`;
                                  
                                  const reply = await callGemini(prompt, system);
                                  alert("AI Reply:\n\n" + reply); // In a full implementation, this goes into the `chats` state array.
                                } catch(err) {
                                  alert("Error: " + err.message);
                                } finally {
                                  setIsProcessing(false);
                                }
                              }
                            }}
                            className="w-full bg-slate-100 border-none rounded-xl pl-4 pr-10 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                          />
                          <i className="fa-solid fa-paper-plane absolute right-4 top-3.5 text-indigo-500"></i>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })
            )}
          </div>

          {}
          {showSettings && (
            <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50">
              <div className="bg-white rounded-2xl shadow-2xl p-6 w-[400px]">
                <h2 className="text-xl font-bold mb-4">Settings</h2>
                <label className="block text-sm font-bold text-slate-700 mb-2">Gemini API Key</label>
                <input 
                  type="password" 
                  value={apiKey} 
                  onChange={e => setApiKey(e.target.value)}
                  className="w-full border border-slate-300 rounded-lg px-3 py-2 mb-6"
                  placeholder="AIzaSy..."
                />
                <div className="flex justify-end gap-2">
                  <button onClick={() => setShowSettings(false)} className="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 font-semibold">Close</button>
                </div>
              </div>
            </div>
          )}

          {showManual && (
            <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50">
              <div className="bg-white rounded-2xl shadow-2xl p-8 w-[600px] max-h-[80vh] overflow-y-auto">
                <h2 className="text-2xl font-bold mb-4">KnowledgeBase AI Manual</h2>
                <div className="prose prose-slate text-sm">
                  <h3>Creating Entries</h3>
                  <p>Paste a YouTube URL, PDF link, or raw text into the input field above the middle list. The AI will automatically analyze it, extract taxonomy, and format it into Markdown.</p>
                  
                  <h3>Cards & Colors</h3>
                  <ul>
                    <li><strong>Blue Border:</strong> PDF Document</li>
                    <li><strong>Red Border:</strong> Media (YouTube, Video, Audio)</li>
                    <li><strong>Standard Border:</strong> Text/Web note</li>
                  </ul>

                  <h3>Inline References</h3>
                  <p>To link notes together, simply click and drag an entry card from the middle list directly into the text editor of another note. This creates an inline shortcode <code>[[kb-ref:ID]]</code>. When viewing the note, it renders as a linked card at the bottom, and the AI will include it in chat contexts.</p>
                  
                  <h3>Chatting</h3>
                  <p>Open a note and type in the chat box at the bottom. The AI will read the note and any referenced notes to answer your questions (limited to 100 words).</p>
                </div>
                <div className="mt-8 flex justify-end">
                  <button onClick={() => setShowManual(false)} className="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-semibold">Got it</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
