<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KnowledgeBase AI</title>
  
  <!-- Consolidated Tailwind CSS (Single CDN loading to prevent configuration conflicts) -->
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
  <script src="https://unpkg.com/turndown/dist/turndown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans overflow-hidden">
  
  <!-- Global Diagnostic Screen (Catches & reveals compilation issues immediately) -->
  <div id="error-fallback" class="hidden fixed inset-0 bg-slate-900 text-white p-8 flex flex-col items-center justify-center z-[9999]">
    <div class="max-w-md w-full bg-slate-800 p-6 rounded-xl shadow-xl border border-red-500/30">
      <div class="flex items-center gap-3 text-red-500 mb-4">
        <i class="fa-solid fa-triangle-exclamation text-3xl"></i>
        <h1 class="text-xl font-bold">App Initialization Error</h1>
      </div>
      <p class="text-slate-300 text-sm mb-4">A background script failed or encountered a critical syntax error. This is usually due to delayed CDNs or local script blockers.</p>
      <div id="error-details" class="bg-black/40 p-4 rounded-lg font-mono text-xs text-red-400 overflow-x-auto mb-6 max-h-40"></div>
      <button onclick="window.location.reload()" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium transition-colors">
        <i class="fa-solid fa-rotate-right mr-2"></i> Reload App
      </button>
    </div>
  </div>

  <div id="root"></div>

  <script>
    // Listen for compilation errors before React mounts
    window.addEventListener('error', function(e) {
      console.error("Captured Error:", e);
      const fallback = document.getElementById('error-fallback');
      const details = document.getElementById('error-details');
      if (fallback && details) {
        fallback.classList.remove('hidden');
        details.textContent = `${e.message}\nLine: ${e.lineno}:${e.colno}\nFile: ${e.filename}`;
      }
    });
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const APP_VERSION = "v1.4.3";

    // Safe Wrapper for Markdown Parsing (Avoids crashing if Marked fails to load)
    const parseMarkdown = (content) => {
      if (typeof marked !== 'undefined' && marked.parse) {
        return marked.parse(content || '');
      }
      return (content || '')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/\n/g, '<br />');
    };

    const parseMarkdownInline = (content) => {
      if (typeof marked !== 'undefined' && marked.parseInline) {
        return marked.parseInline(content || '');
      }
      return content || '';
    };

    const INITIAL_ENTRY = {
      id: 'sample-1',
      title: `Welcome to your AI Knowledge Base (${APP_VERSION})`,
      summary: 'A quick guide on how to use your new offline-first AI tool.',
      shortVersion: [
        'Drag and drop text or web links into the top-left drop zone.',
        'Everything saves automatically to your linked local file.',
        'Switch workspaces to manage different JSON files.',
        'Chat directly with your documents below.'
      ],
      fullContent: 'Welcome! This version runs entirely in your browser and syncs directly to a file on your hard drive.\n\n### Markdown Support\n* Use **Markdown** to edit your notes.\n* Drag and drop URLs; the scraper will automatically convert web pages into clean Markdown for you.',
      categories: ['getting started'],
      tags: ['tutorial'],
      numericId: 1,
      createdAt: Date.now(),
      sourceUrl: null,
      references: [],
      pinned: false
    };

    const normalizeTaxonomy = (entries) => {
      return entries.map(e => ({
        ...e,
        categories: Array.isArray(e.categories) ? [...new Set(e.categories.map(c => c.toLowerCase()))] : [],
        tags: Array.isArray(e.tags) ? [...new Set(e.tags.map(t => t.toLowerCase()))] : []
      }));
    };

    const fetchAndScrubUrl = async (urlString) => {
      let html = '';
      try {
        const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(urlString)}`);
        const data = await response.json();
        if (data.contents) html = data.contents;
        else throw new Error("Invalid proxy response");
      } catch (err) {
        try {
          const response2 = await fetch(`https://corsproxy.io/?${encodeURIComponent(urlString)}`);
          if (!response2.ok) throw new Error("Network response failed");
          html = await response2.text();
        } catch (err2) {
          throw new Error("Scrape blocked. Falling back to search.");
        }
      }
      
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      
      let originalTitle = doc.querySelector('meta[property="og:title"]')?.getAttribute('content') || 
                          doc.querySelector('title')?.textContent || 
                          doc.querySelector('h1')?.textContent || 
                          "Untitled Page";
      originalTitle = originalTitle.trim();
      originalTitle = originalTitle.replace(/\s*[|•-]\s*([A-Za-z0-9 ]+Substack|[A-Za-z0-9 ]+Medium|[A-Za-z0-9 ]+Blog|[A-Za-z0-9 ]+HQ|QUT.*)$/i, '').trim();

      const unwanted = doc.querySelectorAll('script, style, noscript, iframe, svg, video, header, footer, nav, aside, form, .menu, .mega-menu, .global-nav, .navbar');
      unwanted.forEach(el => el.remove());
      
      let mainNode = doc.querySelector('.profile-details') || doc.querySelector('article') || doc.querySelector('main') || doc.body;
      
      let markdownContent = '';
      if (typeof TurndownService !== 'undefined') {
        const turndownService = new TurndownService({ headingStyle: 'atx', codeBlockStyle: 'fenced' });
        markdownContent = turndownService.turndown(mainNode);
      } else {
        markdownContent = mainNode.innerText || mainNode.textContent || '';
      }
      
      if (!markdownContent || markdownContent.length < 50) throw new Error("No text found. Falling back to search.");
      return {
        title: originalTitle,
        content: markdownContent.substring(0, 50000)
      }; 
    };

    async function verifyPermission(fileHandle, readWrite) {
      const options = { mode: readWrite ? 'readwrite' : 'read' };
      if ((await fileHandle.queryPermission(options)) === 'granted') return true;
      if ((await fileHandle.requestPermission(options)) === 'granted') return true;
      return false;
    }

    const callGemini = async (key, payload, model) => {
      try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
        const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const result = await response.json();
        
        if (result.error) throw new Error(result.error.message);
        if (!result.candidates || result.candidates.length === 0) {
          const reason = result.promptFeedback?.blockReason || "Empty response from API";
          throw new Error(`AI rejected the prompt. Reason: ${reason}`);
        }
        
        return result;
      } catch (err) {
        throw err;
      }
    };

    function KnowledgeApp() {
      const [appState, setAppState] = useState('init'); 
      const [savedHandle, setSavedHandle] = useState(null);
      const [fileHandle, setFileHandle] = useState(null);
      const [fileName, setFileName] = useState('');
      
      const [entries, setEntries] = useState([]);
      const [chats, setChats] = useState({});
      const [apiKey, setApiKey] = useState('');
      const [model, setModel] = useState('gemini-3.1-flash-lite');
      
      const [showKeyModal, setShowKeyModal] = useState(false);
      const [showManual, setShowManual] = useState(false);
      const [tempKey, setTempKey] = useState('');
      const [tempModel, setTempModel] = useState('');
      
      const [activeCategories, setActiveCategories] = useState([]);
      const [activeTags, setActiveTags] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedEntryIds, setSelectedEntryIds] = useState([]);
      const [chatScope, setChatScope] = useState('selected'); 
      
      const [editingEntryId, setEditingEntryId] = useState(null);
      const [editData, setEditData] = useState({ title: '', summary: '', shortVersion: '', fullContent: '', categories: [], tags: [], sourceUrl: '', references: [] });
      const [editCatInput, setEditCatInput] = useState('');
      const [editTagInput, setEditTagInput] = useState('');

      const [isDragging, setIsDragging] = useState(false);
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [error, setError] = useState(null);
      
      const [chatInput, setChatInput] = useState('');
      const [isChatting, setIsChatting] = useState(false);
      const chatScrollRef = useRef(null);
      const sourceCacheRef = useRef({});
      
      const [taxonomyInput, setTaxonomyInput] = useState('');
      const [isTaxonomyProcessing, setIsTaxonomyProcessing] = useState(false);

      const [dragOverEntryId, setDragOverEntryId] = useState(null);
      const [editingTitleId, setEditingTitleId] = useState(null);
      const [tempTitle, setTempTitle] = useState('');

      useEffect(() => {
        if (typeof idbKeyval !== 'undefined') {
          idbKeyval.get('kb_file_handle').then(handle => {
            if (handle) setSavedHandle(handle);
            setAppState('landing');
          }).catch(err => {
            console.error("IndexDB failed:", err);
            setAppState('landing');
          });
        } else {
          setAppState('landing');
        }
      }, []);

      useEffect(() => {
        if (appState !== 'workspace' || !fileHandle) return;
        const timer = setTimeout(async () => {
          try {
            const hasPerm = await verifyPermission(fileHandle, true);
            if (!hasPerm) return;
            const writable = await fileHandle.createWritable();
            await writable.write(JSON.stringify({ entries, chats, apiKey, model }, null, 2));
            await writable.close();
          } catch (err) {
            console.error("Auto-save failed:", err);
          }
        }, 1000);
        return () => clearTimeout(timer);
      }, [entries, chats, apiKey, model, appState, fileHandle]);

      const ensureNumericIds = (loadedEntries) => {
        let maxId = loadedEntries.reduce((max, e) => Math.max(max, e.numericId || 0), 0);
        return loadedEntries.map(e => {
          if (!e.numericId) {
            maxId += 1;
            return { ...e, numericId: maxId };
          }
          return e;
        });
      };

      const processLoadedEntries = (entries) => {
        return normalizeTaxonomy(ensureNumericIds(entries));
      };

      const loadWorkspaceData = async (handle) => {
        try {
          const hasPerm = await verifyPermission(handle, true);
          if (!hasPerm) return;
          const file = await handle.getFile();
          const text = await file.text();
          let data = { entries: [], chats: {} };
          
          if (text.trim()) data = JSON.parse(text);
          
          if (data.entries?.length > 0) {
            const migrated = processLoadedEntries(data.entries);
            setEntries(migrated);
            setSelectedEntryIds([migrated[0].id]);
          } else {
            setEntries([INITIAL_ENTRY]);
            setSelectedEntryIds([INITIAL_ENTRY.id]);
          }
          
          if (data.chats) setChats(data.chats);
          if (data.apiKey) setApiKey(data.apiKey); else setApiKey('');
          if (data.model) setModel(data.model); else setModel('gemini-3.1-flash-lite');
          
          setFileHandle(handle);
          setFileName(file.name);
          if (typeof idbKeyval !== 'undefined') {
            await idbKeyval.set('kb_file_handle', handle);
          }
          setAppState('workspace');
        } catch (err) {
          setError(`Failed to open workspace: ${err.message}`);
        }
      };

      const handleResume = () => loadWorkspaceData(savedHandle);

      const handleOpenFile = async () => {
        try {
          if (!window.showOpenFilePicker) throw new Error("API_NOT_SUPPORTED");
          const [handle] = await window.showOpenFilePicker({
            types: [{ description: 'JSON Files', accept: { 'application/json': ['.json'] } }]
          });
          await loadWorkspaceData(handle);
        } catch (err) {
          if (err.name !== 'AbortError') setError(`File error: ${err.message}`);
        }
      };

      const handleNewFile = async () => {
        try {
          if (!window.showSaveFilePicker) throw new Error("API_NOT_SUPPORTED");
          const handle = await window.showSaveFilePicker({
            suggestedName: 'my-knowledge-base.json',
            types: [{ description: 'JSON Files', accept: { 'application/json': ['.json'] } }]
          });
          setFileHandle(handle);
          setFileName(handle.name);
          setEntries([INITIAL_ENTRY]);
          setChats({});
          setApiKey('');
          setModel('gemini-3.1-flash-lite');
          setSelectedEntryIds([INITIAL_ENTRY.id]);
          if (typeof idbKeyval !== 'undefined') {
            await idbKeyval.set('kb_file_handle', handle);
          }
          setAppState('workspace');
        } catch (err) {
           if (err.name !== 'AbortError') setError(`File error: ${err.message}`);
        }
      };
      
      const handleManualImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.entries) {
              const migrated = processLoadedEntries(data.entries);
              setEntries(migrated);
              if (migrated.length > 0) setSelectedEntryIds([migrated[0].id]);
            }
            if (data.chats) setChats(data.chats);
            if (data.apiKey) setApiKey(data.apiKey); else setApiKey('');
            if (data.model) setModel(data.model); else setModel('gemini-3.1-flash-lite');
            setFileName(file.name);
            setFileHandle(null);
            setAppState('workspace');
          } catch (err) {
            setError("Invalid JSON file.");
          }
        };
        reader.readAsText(file);
      };

      const handleCloseWorkspace = () => {
        setAppState('landing');
        setFileHandle(null);
        setEntries([]);
        setChats({});
        setApiKey('');
      };

      const allCategories = new Set();
      const allTags = new Set();
      entries.forEach(e => {
        if (Array.isArray(e.categories)) e.categories.forEach(c => allCategories.add(c));
        if (Array.isArray(e.tags)) e.tags.forEach(t => allTags.add(t));
      });

      const availableTags = new Set();
      entries.forEach(e => {
        const matchesCat = activeCategories.length === 0 || (Array.isArray(e.categories) && e.categories.some(c => activeCategories.includes(c)));
        if (matchesCat && Array.isArray(e.tags)) e.tags.forEach(t => availableTags.add(t));
      });

      const selectedEntries = entries.filter(e => selectedEntryIds.includes(e.id));
      const currentChatKey = chatScope === 'all' ? 'global_all' : selectedEntryIds.slice().sort().join(',');

      useEffect(() => {
        if (chatScrollRef.current) chatScrollRef.current.scrollTop = chatScrollRef.current.scrollHeight;
      }, [chats, currentChatKey, isChatting]);

      const handleDrop = async (e) => {
        e.preventDefault();
        setIsDragging(false);
        setError(null);
        
        const droppedData = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain');
        if (!droppedData) return;
        
        if (e.dataTransfer.getData('kb-ref-id') || e.dataTransfer.getData('kb-tax') || e.dataTransfer.getData('kb-tax-remove')) return;

        if (!apiKey) return setError("Please set your Gemini API key first.");

        setIsAnalyzing(true);
        try {
          const isUrl = /^https?:\/\/[^\s/$.?#].[^\s]*$/i.test(droppedData.trim());
          const isYouTube = isUrl && /(youtube\.com|youtu\.be)/i.test(droppedData.trim());
          const sourceUrl = isUrl ? droppedData.trim() : null;
          let rawContent = droppedData;
          let originalWebTitle = null;
          let useSearchTool = false;

          const schema = {
            type: "OBJECT",
            properties: {
              title: { type: "STRING" },
              summary: { type: "STRING" },
              shortVersion: { type: "ARRAY", items: { type: "STRING" } },
              fullContent: { type: "STRING" },
              categories: { type: "ARRAY", items: { type: "STRING" } },
              tags: { type: "ARRAY", items: { type: "STRING" } }
            },
            required: ["title", "summary", "shortVersion", "fullContent", "categories", "tags"]
          };

          const taxonomyRules = `
          5. Categories: Assign 1-2 SUPER BROAD domain categories. Review these existing categories: ${JSON.stringify(Array.from(allCategories))}. ONLY reuse an existing category if it is a PERFECT fit. Create a new accurate domain if needed. Return strictly in lowercase.
          6. Tags: Assign 3-5 highly specific concept tags. Include the author's name as a tag. Review existing tags: ${JSON.stringify(Array.from(allTags))}. ONLY reuse existing tags if they are highly relevant. Create new ones otherwise. Return strictly in lowercase.`;
          
          const summaryRules = `4. fullContent string: Create an expanded summary. Succinctly summarize each point of the source, regardless of its length. Format with clean Markdown. Do NOT include any external links or 'Read more' text.`;

          let prompt = '';
          if (isYouTube) {
            useSearchTool = true;
            
            let videoId = '';
            const urlObj = new URL(droppedData.trim());
            if (urlObj.hostname.includes('youtu.be')) {
               videoId = urlObj.pathname.slice(1);
            } else {
               videoId = urlObj.searchParams.get('v');
            }

            prompt = `Use Google Search to find exact content, transcript, or summary for this SPECIFIC YouTube video ID: ${videoId} (URL: ${droppedData.trim()}). CRITICAL: You must only summarize this exact video, do not summarize general topics related to it. Return strictly as JSON. 
            1. Title. 2. Summary. Include creator's name if identifiable. 3. 3-5 points in 'shortVersion'. 4. Reconstruct detailed fullContent strictly in Markdown. ${taxonomyRules}`;
          } else if (isUrl) {
            try {
              const scrapeResult = await fetchAndScrubUrl(droppedData.trim());
              rawContent = scrapeResult.content;
              originalWebTitle = scrapeResult.title;
              prompt = `Analyze this markdown text. Return strictly as JSON. 
              1. Title: Create a title for this piece (or use: "${originalWebTitle.replace(/"/g, '\\"')}"). 
              2. 1-2 sentence summary. Include author's name if identifiable. 
              3. 3-5 key points in 'shortVersion'.
              ${taxonomyRules}
              ${summaryRules}
              Content:\n${rawContent.substring(0, 40000)}`;
            } catch (err) {
              useSearchTool = true;
              prompt = `Use Google Search to find exact content for this URL: ${droppedData.trim()}. Return strictly as JSON. 
              1. Title. 2. Summary. Include author's name if identifiable. 3. 3-5 points in 'shortVersion'. 4. Reconstruct detailed fullContent strictly in Markdown. ${taxonomyRules}`;
            }
          } else {
             prompt = `Analyze this text. Return strictly as JSON. 1. Title. 2. Summary. 3. 3-5 points in 'shortVersion'. 4. Format the input text as clean Markdown as 'fullContent'. ${taxonomyRules}\nContent:\n${rawContent.substring(0, 40000)}`;
          }

          const payload = {
            contents: [{ role: 'user', parts: [{ text: prompt }] }],
            generationConfig: { responseMimeType: "application/json", responseSchema: schema }
          };
          if (useSearchTool) payload.tools = [{ google_search: {} }];

          const result = await callGemini(apiKey, payload, model);
          const parsedResult = JSON.parse(result.candidates[0].content.parts[0].text);
          
          parsedResult.categories = (parsedResult.categories || []).map(c => c.toLowerCase());
          parsedResult.tags = (parsedResult.tags || []).map(t => t.toLowerCase());

          const nextNumericId = entries.reduce((max, e) => Math.max(max, e.numericId || 0), 0) + 1;
          const newEntry = { 
            ...parsedResult, 
            title: originalWebTitle || parsedResult.title || 'Untitled Note',
            numericId: nextNumericId,
            id: 'entry-' + Date.now(), 
            createdAt: Date.now(),
            sourceUrl: sourceUrl,
            references: [],
            pinned: false
          };
          
          setEntries(prev => [newEntry, ...prev]);
          setSelectedEntryIds([newEntry.id]);
          setActiveCategories([]);
          setActiveTags([]);
        } catch (err) {
          setError(err.message || "Failed to process content.");
        } finally {
          setIsAnalyzing(false);
        }
      };

      const handleEntryClick = (e, id) => {
        if (e.ctrlKey || e.metaKey) {
          setSelectedEntryIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
        } else {
          setSelectedEntryIds([id]);
        }
        setEditingEntryId(null);
      };

      const deleteEntry = (id) => {
        setEntries(prev => prev.filter(e => e.id !== id));
        setSelectedEntryIds(prev => prev.filter(i => i !== id));
        if (editingEntryId === id) setEditingEntryId(null);
      };

      const handleNewNote = () => {
        const nextNumericId = entries.reduce((max, e) => Math.max(max, e.numericId || 0), 0) + 1;
        const newId = 'entry-' + Date.now();
        const newEntry = {
          id: newId, title: 'Untitled Note', numericId: nextNumericId, summary: '', shortVersion: [], fullContent: '',
          categories: [], tags: [], createdAt: Date.now(), sourceUrl: null, references: [], pinned: false
        };
        setEntries(prev => [newEntry, ...prev]);
        setSelectedEntryIds([newId]);
        setEditData({ title: '', summary: '', shortVersion: '', fullContent: '', categories: [], tags: [], sourceUrl: '', references: [] });
        setEditingEntryId(newId);
      };

      const startEditing = (entry) => {
        setEditData({
          title: entry.title || '', summary: entry.summary || '', fullContent: entry.fullContent || '',
          shortVersion: (Array.isArray(entry.shortVersion) ? entry.shortVersion : []).join('\n'),
          categories: Array.isArray(entry.categories) ? [...entry.categories] : [], 
          tags: Array.isArray(entry.tags) ? [...entry.tags] : [], 
          sourceUrl: entry.sourceUrl || '',
          references: Array.isArray(entry.references) ? entry.references : []
        });
        setEditingEntryId(entry.id);
      };

      const saveNote = () => {
        setEntries(prev => prev.map(e => {
          if (e.id === editingEntryId) {
            return {
              ...e, title: editData.title || 'Untitled', summary: editData.summary, fullContent: editData.fullContent,
              shortVersion: editData.shortVersion.split('\n').map(s => s.trim()).filter(Boolean),
              sourceUrl: editData.sourceUrl || null,
              categories: editData.categories.map(c => c.toLowerCase()),
              tags: editData.tags.map(t => t.toLowerCase()),
              references: editData.references || []
            };
          }
          return e;
        }));
        setEditingEntryId(null);
      };

      const removeEditCategory = (cat) => setEditData(prev => ({ ...prev, categories: prev.categories.filter(c => c !== cat) }));
      const removeEditTag = (tag) => setEditData(prev => ({ ...prev, tags: prev.tags.filter(t => t !== tag) }));

      const handleAddEditCategory = (e) => {
        if (e.key === 'Enter' || e.key === ',') {
          e.preventDefault();
          const val = editCatInput.trim().replace(/^,|,$/g, '').toLowerCase();
          if (val && !editData.categories.includes(val)) {
            setEditData(prev => ({ ...prev, categories: [...prev.categories, val] }));
          }
          setEditCatInput('');
        }
      };

      const handleAddEditTag = (e) => {
        if (e.key === 'Enter' || e.key === ',') {
          e.preventDefault();
          const val = editTagInput.trim().replace(/^,|,$/g, '').toLowerCase();
          if (val && !editData.tags.includes(val)) {
            setEditData(prev => ({ ...prev, tags: [...prev.tags, val] }));
          }
          setEditTagInput('');
        }
      };

      const removeTaxonomyFromEntry = (entryId, type, val) => {
        setEntries(prev => prev.map(ent => {
          if (ent.id === entryId) {
            if (type === 'cat') return { ...ent, categories: (ent.categories || []).filter(c => c !== val) };
            if (type === 'tag') return { ...ent, tags: (ent.tags || []).filter(t => t !== val) };
          }
          return ent;
        }));
      };

      const handleGenerateSummary = async () => {
        if (!apiKey) return setError("Set your API key first.");
        setIsAnalyzing(true);
        try {
          const prompt = `Analyze this note and write a 1-2 sentence summary. Return JSON: {"summary": "text"}.\nTitle: ${editData.title}\nContent: ${editData.fullContent}`;
          const payload = {
            contents: [{ role: 'user', parts: [{ text: prompt }] }],
            generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { summary: { type: "STRING" } } } }
          };
          const result = await callGemini(apiKey, payload, model);
          const data = JSON.parse(result.candidates[0].content.parts[0].text);
          setEditData(prev => ({ ...prev, summary: data.summary || prev.summary }));

          setError("Summary generation failed: " + err.message);
        } finally {
          setIsAnalyzing(false);
        }
      };

      const handleGenerateTakeaways = async () => {
        if (!apiKey) return setError("Set your API key first.");

          const prompt = `Analyze this note. Extract 3-5 key points. Return JSON: {"shortVersion": ["point 1", "point 2"]}. Format each point in Markdown.\nTitle: ${editData.title}\nContent: ${editData.fullContent}`;
          const payload = {
            contents: [{ role: 'user', parts: [{ text: prompt }] }],
            generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { shortVersion: { type: "ARRAY", items: { type: "STRING" } } } } }
          };
          const result = await callGemini(apiKey, payload, model);
          const data = JSON.parse(result.candidates[0].content.parts[0].text);
          if (data.shortVersion && Array.isArray(data.shortVersion)) {
            setEditData(prev => ({ ...prev, shortVersion: data.shortVersion.join('\n') }));
          }
        } catch(err) {
          setError("Takeaway generation failed: " + err.message);
        } finally {
          setIsAnalyzing(false);
        }
      };

      const handleGenerateTaxonomies = async () => {
        if (!apiKey) return setError("Set your API key first.");
        setIsAnalyzing(true);
        try {
          const prompt = `Analyze this note. Return strictly JSON matching this schema: {"categories": ["Category"], "tags": ["tag1", "tag2"]}.
          Rules: 1. Categories: Assign 1-2 SUPER BROAD domain categories. Review existing: ${JSON.stringify(Array.from(allCategories))}. ONLY reuse if perfect match. Return in lowercase.
          2. Tags: Assign 3-5 highly specific concept keywords. Review existing: ${JSON.stringify(Array.from(allTags))}. ONLY reuse if highly relevant. Return in lowercase.
          Title: ${editData.title}\nContent: ${editData.fullContent}`;

          const payload = {
            contents: [{ role: 'user', parts: [{ text: prompt }] }],
            generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { categories: { type: "ARRAY", items: { type: "STRING" } }, tags: { type: "ARRAY", items: { type: "STRING" } } } } }
          };
          
          const result = await callGemini(apiKey, payload, model);
          const data = JSON.parse(result.candidates[0].content.parts[0].text);
          setEditData(prev => ({ 
            ...prev, 
            categories: Array.isArray(data.categories) ? data.categories.map(c => c.toLowerCase()) : prev.categories, 
            tags: Array.isArray(data.tags) ? data.tags.map(t => t.toLowerCase()) : prev.tags 
          }));
        } catch(err) {
          setError("Taxonomy generation failed: " + err.message);
        } finally {
          setIsAnalyzing(false);
        }
      };

      const handleTaxonomyCommand = async (e) => {
        e.preventDefault();
        if (!taxonomyInput.trim() || !apiKey) {
          if (!apiKey) setError("Set your API key first.");
          return;
        }

        setIsTaxonomyProcessing(true);
        try {
          const prompt = `You are a careful database taxonomy manager.
          Current Categories: ${JSON.stringify(Array.from(allCategories))}
          Current Tags: ${JSON.stringify(Array.from(allTags))}
          Command: "${taxonomyInput}"

          Safety Rule: Deleting multiple categories/tags is high-risk. Only delete if explicitly requested by the user. Do not delete broad categories unless the user is certain.
          Return JSON matching (ensure all new values are lowercase):
          {
            "categoryChanges": [{"old": "OldName", "new": "NewName"}],
            "categoryDeletions": ["NameToRemove"],
            "tagChanges": [{"old": "OldName", "new": "NewName"}],
            "tagDeletions": ["NameToRemove"]
          }`;

          const schema = {
            type: "OBJECT",
            properties: {
              categoryChanges: { type: "ARRAY", items: { type: "OBJECT", properties: { old: { type: "STRING" }, new: { type: "STRING" } } } },
              categoryDeletions: { type: "ARRAY", items: { type: "STRING" } },
              tagChanges: { type: "ARRAY", items: { type: "OBJECT", properties: { old: { type: "STRING" }, new: { type: "STRING" } } } },
              tagDeletions: { type: "ARRAY", items: { type: "STRING" } }
            }
          };

          const payload = {
            contents: [{ role: 'user', parts: [{ text: prompt }] }],
            generationConfig: { responseMimeType: "application/json", responseSchema: schema }
          };
          
          const result = await callGemini(apiKey, payload, model);
          const data = JSON.parse(result.candidates[0].content.parts[0].text);

          setEntries(prev => prev.map(entry => {
            let newCats = [...(Array.isArray(entry.categories) ? entry.categories : [])];
            let newTags = [...(Array.isArray(entry.tags) ? entry.tags : [])];

            if (data.categoryChanges) {
              data.categoryChanges.forEach(change => {
                if (newCats.includes(change.old)) {
                  newCats = newCats.filter(c => c !== change.old);
                  if (change.new && !newCats.includes(change.new)) newCats.push(change.new.toLowerCase());
                }
              });
            }
            if (data.categoryDeletions) {
              newCats = newCats.filter(c => !data.categoryDeletions.includes(c));
            }

            if (data.tagChanges) {
              data.tagChanges.forEach(change => {
                if (newTags.includes(change.old)) {
                  newTags = newTags.filter(t => t !== change.old);
                  if (change.new && !newTags.includes(change.new)) newTags.push(change.new.toLowerCase());
                }
              });
            }
            if (data.tagDeletions) {
              newTags = newTags.filter(t => !data.tagDeletions.includes(t));
            }

            return { 
              ...entry, 
              categories: [...new Set(newCats.map(c => c.toLowerCase()))], 
              tags: [...new Set(newTags.map(t => t.toLowerCase()))] 
            };
          }));
          
          setTaxonomyInput('');
        } catch(err) {
          setError("Taxonomy update failed: " + err.message);
        } finally {
          setIsTaxonomyProcessing(false);
        }

      const handleSendMessage = async (e) => {

        if ((selectedEntryIds.length > 1 && targetEntries.length > 1) || chatScope === 'all') {

          const nextNumericId = entries.reduce((max, ent) => Math.max(max, ent.numericId || 0), 0) + 1;
          const newId = 'entry-' + Date.now();

            title: `Query: ${userMessage.substring(0, 30)}${userMessage.length > 30 ? '...' : ''}`,

            summary: `Combined chat session across ${targetEntries.length} notes.`,
            shortVersion: [],
            fullContent: '',
            categories: [],
            tags: [],
            createdAt: Date.now(),
            sourceUrl: null,
            isCombined: true,
            referencedIds: targetEntries.map(ent => ent.id),
            references: [],
            pinned: false
          };
          
          setEntries(prev => [newCombinedEntry, ...prev]);
          setSelectedEntryIds([newId]);
          setChatScope('selected');
          activeChatKey = newId;
        } else if (selectedEntryIds.length === 1) {
          activeChatKey = selectedEntryIds[0];
        } else {
          if (targetEntries.length > 0) {

          } else {

        }

            contextEntries = (newCombinedEntry ? targetEntries : entries).filter(ent => activeEntry.referencedIds.includes(ent.id));

            contextEntries = [activeEntry];
        }

              if (!isYouTube) {

                  const scrapeResult = await fetchAndScrubUrl(ent.sourceUrl);
                  sourceCacheRef.current[ent.id] = scrapeResult.content;
                } catch (err) {
                  sourceCacheRef.current[ent.id] = null; 
                }
              }
            }
          }

          const contextText = contextEntries.map(ent => {
            let base = `[START OF DOCUMENT ${ent.numericId}]\nTitle: ${ent.title}\nSummary: ${ent.summary}\nContent: ${ent.fullContent}`;
            if (ent.sourceUrl) {
                base += `\nSource URL: ${ent.sourceUrl}`;
                const rawSource = sourceCacheRef.current[ent.id];
                if (rawSource) {
                    base += `\nRaw Source Content (Full Text):\n${rawSource.substring(0, 30000)}`;
                }
            }
            base += `\n[END OF DOCUMENT ${ent.numericId}]`;
            return base;
          }).join('\n\n');

          const payload = {
            contents: [...currentHistory.map(msg => ({ role: msg.role, parts: [{ text: msg.text }] })), { role: 'user', parts: [{ text: userMessage }] }],
            systemInstruction: { parts: [{ text: `Answer strictly based on the provided document context. The user has provided ${contextEntries.length} separate documents. Cite the document number when combining information. Context scope: ${chatScope}.
            
CRITICAL WRITING RULES:
- Limit responses to 100 words max unless explicitly asked to expand.

Documents:\n${contextText}` }] }

          if (!responseText.includes(APP_VERSION)) {
              responseText += `\n\n*(via ${APP_VERSION})*`;

          setChats(prev => ({ ...prev, [activeChatKey]: [...updatedHistory, { role: 'model', text: responseText }] }));
        } catch (err) {
          setChats(prev => ({ ...prev, [activeChatKey]: [...updatedHistory, { role: 'model', text: `⚠️ Error: ${err.message}` }] }));

                              </div>
                            )}
                          </div>
                        </div>
                      ) : (
                        <div className="max-w-3xl mx-auto p-8 pb-32">
                          <div className="flex justify-between items-start mb-6">
                            <div className="flex flex-wrap items-center gap-2">
                              {Array.isArray(entry.categories) && entry.categories.map(c => <span key={c} className="text-xs font-medium text-indigo-600 bg-indigo-50 border border-indigo-100 px-2.5 py-1 rounded-full lowercase">{c}</span>)}
                              {Array.isArray(entry.tags) && entry.tags.map(t => <span key={t} className="text-xs font-medium text-slate-600 bg-slate-100 border border-slate-200 px-2.5 py-1 rounded-full lowercase">#{t}</span>)}
                              {entry.sourceUrl && <a href={entry.sourceUrl} target="_blank" rel="noopener noreferrer" className="text-xs font-semibold text-white bg-indigo-600 hover:bg-indigo-700 px-2.5 py-1 rounded-full flex items-center gap-1.5 transition-colors shadow-sm"><i className="fa-solid fa-arrow-up-right-from-square text-[10px]"></i> Source</a>}
                            </div>
                            {(!isCombinedView || selectedEntryIds.length > 1) && (
                              <div className="flex gap-2">
                                <button onClick={() => startEditing(entry)} className="text-slate-400 hover:text-indigo-600 p-2 rounded hover:bg-indigo-50 transition-colors" title="Edit Note"><i className="fa-solid fa-pen"></i></button>
                                <button onClick={() => deleteEntry(entry.id)} className="text-slate-400 hover:text-red-500 p-2 rounded hover:bg-red-50 transition-colors" title="Delete Note"><i className="fa-solid fa-trash-can"></i></button>
                              </div>
                            )}
                          </div>
                          <h1 className="text-3xl font-bold mb-4">
                            <span className="text-slate-400 font-normal mr-2">{entry.numericId}:</span>
                            {entry.title || 'Untitled'}
                          </h1>
                          <p className="text-lg text-slate-500 mb-8">{entry.summary}</p>
                          {Array.isArray(entry.shortVersion) && entry.shortVersion.length > 0 && (
                            <div className="bg-slate-50 rounded-xl p-6 mb-8 border border-slate-100">
                              <h3 className="text-sm font-bold uppercase text-slate-400 mb-4">Key Takeaways</h3>
                              <ul className="space-y-2">
                                {entry.shortVersion.map((point, idx) => (
                                  <li key={idx} className="flex"><i className="fa-solid fa-chevron-right text-indigo-400 mt-1 mr-2 text-sm"></i><span className="text-slate-700 prose-a:text-indigo-600 prose-a:underline" dangerouslySetInnerHTML={{ __html: parseMarkdownInline(point) }}></span></li>
                                ))}
                              </ul>
                            </div>
                          )}
                          <h3 className="text-sm font-bold uppercase text-slate-400 mb-4">Expanded Summary</h3>
                          <div className="prose prose-slate max-w-none text-slate-800" dangerouslySetInnerHTML={{ __html: parseMarkdown(entry.fullContent || '') }} />
                          
                          {Array.isArray(entry.references) && entry.references.length > 0 && (
                            <div className="mt-12 pt-8 border-t border-slate-100">
                              <h3 className="text-sm font-bold uppercase text-slate-400 mb-4 flex items-center"><i className="fa-solid fa-link mr-2"></i> Linked References</h3>
                              <div className="grid grid-cols-1 gap-3">
                                {entry.references.map(refId => {
                                  const refEntry = entries.find(e => e.id === refId);
                                  if (!refEntry) return null;
                                  return (
                                    <div 
                                      key={refId} 
                                      onClick={() => setSelectedEntryIds(prev => prev.includes(refId) ? prev : [...prev, refId])} 
                                      className="p-4 border border-slate-200 rounded-xl cursor-pointer hover:border-indigo-300 hover:shadow-md transition-all bg-white flex justify-between items-center group"
                                    >
                                      <div>
                                        <h4 className="text-sm font-semibold text-slate-800 mb-1 group-hover:text-indigo-700 transition-colors"><span className="text-slate-400 font-normal mr-1">{refEntry.numericId}:</span>{refEntry.title}</h4>
                                        <p className="text-xs text-slate-500 line-clamp-1">{refEntry.summary}</p>
                                      </div>
                                      <i className="fa-solid fa-arrow-right text-slate-300 group-hover:text-indigo-400 transition-colors ml-4"></i>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  ))
                )}
              </div>
            </div>

            {}
            {/* CHAT AREA */}
            {editingEntryId === null && (
              <div className="border-t min-[1500px]:border-t-0 min-[1500px]:border-l border-slate-200 bg-slate-100 min-[1500px]:w-[400px] flex flex-col flex-shrink-0 h-[40vh] min-[1500px]:h-full transition-all">
                 <div className="flex bg-slate-200/60 p-1 rounded-lg m-4 mt-5">
                    <button onClick={() => setChatScope('selected')} className={`flex-1 text-xs py-1.5 rounded-md font-medium transition-colors ${chatScope === 'selected' ? 'bg-white shadow-sm text-indigo-700' : 'text-slate-500 hover:text-slate-700'}`}>Selected ({selectedEntryIds.length})</button>
                    <button onClick={() => setChatScope('all')} className={`flex-1 text-xs py-1.5 rounded-md font-medium transition-colors ${chatScope === 'all' ? 'bg-white shadow-sm text-indigo-700' : 'text-slate-500 hover:text-slate-700'}`}>All ({entries.filter(e => !e.isCombined).length})</button>
                 </div>
                 
                 <div ref={chatScrollRef} className="flex-1 overflow-y-auto px-4 pb-4 space-y-4">
                    {chats[currentChatKey]?.map((msg, idx) => (
                      <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                        {msg.role === 'user' ? (
                          <div className="max-w-[90%] rounded-2xl px-4 py-2 text-sm bg-indigo-600 text-white rounded-br-none whitespace-pre-wrap">
                            {msg.text}
                          </div>
                        ) : (
                          <div 
                            className="max-w-[90%] rounded-2xl px-4 py-3 text-sm bg-white border border-slate-200 text-slate-800 rounded-bl-none shadow-sm prose prose-sm prose-slate max-w-none prose-p:my-1 prose-headings:my-2 prose-ul:my-1 prose-li:my-0 prose-a:text-indigo-600"
                            dangerouslySetInnerHTML={{ __html: parseMarkdown(msg.text) }}
                          />
                        )}
                      </div>
                    ))}
                    {isChatting && <div className="text-slate-400 text-sm italic ml-2"><i className="fa-solid fa-circle-notch fa-spin mr-2"></i>AI is processing...</div>}
                 </div>

                 <form onSubmit={handleSendMessage} className="p-4 bg-slate-100 border-t border-slate-200 relative shrink-0">
                    <input type="text" value={chatInput} onChange={(e) => setChatInput(e.target.value)} placeholder={`Query ${chatScope === 'all' ? 'entire knowledge base' : 'selected documents'}...`} className="w-full pl-4 pr-12 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 bg-white shadow-sm" />
                    <button type="submit" disabled={isChatting} className="absolute right-6 top-6 text-indigo-600 hover:text-indigo-800 disabled:opacity-50"><i className="fa-solid fa-paper-plane"></i></button>
                 </form>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<KnowledgeApp />);
  </script>
</body>
</html>
