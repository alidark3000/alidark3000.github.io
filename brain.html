<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KnowledgeBase AI</title>
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">

  <!-- Consolidated Tailwind CSS (Single CDN loading to prevent configuration conflicts) -->

  <script>
    tailwind.config = {
      darkMode: 'media',

              surface: '#F2F0ED',
              surfacedark: '#252422',
              accent: '#D47A57',
              accentdark: '#C76541',
            }
          },
          typography: (theme) => ({
            claude: {
              css: {
                '--tw-prose-body': theme('colors.stone[800]'),
                '--tw-prose-headings': theme('colors.stone[900]'),
                'font-family': theme('fontFamily.serif')[0],
                '--tw-prose-links': theme('colors.orange[700]'),
                '--tw-prose-bold': theme('colors.stone[900]'),
                '--tw-prose-counters': theme('colors.stone[500]'),
                '--tw-prose-bullets': theme('colors.stone[300]'),

                '--tw-prose-th-borders': theme('colors.stone[300]'),
                '--tw-prose-td-borders': theme('colors.stone[200]'),
                '--tw-prose-invert-body': theme('colors.stone[300]'),
                '--tw-prose-invert-headings': theme('colors.white'),
                '--tw-prose-invert-links': theme('colors.orange[400]'),
                '--tw-prose-invert-bold': theme('colors.white'),
                '--tw-prose-invert-counters': theme('colors.stone[400]'),
                '--tw-prose-invert-bullets': theme('colors.stone[600]'),
                '--tw-prose-invert-quotes': theme('colors.stone[100]'),
                '--tw-prose-invert-quote-borders': theme('colors.orange[700]'),
                '--tw-prose-invert-captions': theme('colors.stone[400]'),
                '--tw-prose-invert-code': theme('colors.white'),
                '--tw-prose-invert-pre-code': theme('colors.stone[300]'),
                '--tw-prose-invert-pre-bg': 'rgb(0 0 0 / 50%)',
                '--tw-prose-invert-th-borders': theme('colors.stone[600]'),
                '--tw-prose-invert-td-borders': theme('colors.stone[700]'),
              },
            },
          }),
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
  <script src="https://unpkg.com/turndown/dist/turndown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-claude-bg dark:bg-claude-bgdark text-stone-800 dark:text-stone-300 font-sans overflow-hidden transition-colors duration-200 antialiased selection:bg-orange-500/30">
  
  <!-- Global Diagnostic Screen -->
  <div id="error-fallback" class="hidden fixed inset-0 bg-slate-900 text-white p-8 flex flex-col items-center justify-center z-[9999]">
    <div class="max-w-md w-full bg-slate-800 p-6 rounded-xl shadow-xl border border-red-500/30">
      <div class="flex items-center gap-3 text-red-500 mb-4">
        <i class="fa-solid fa-triangle-exclamation text-3xl"></i>
        <h1 class="text-xl font-bold">App Initialization Error</h1>
      </div>
      <p class="text-slate-300 text-sm mb-4">A background script failed or encountered a critical syntax error. This is usually due to delayed CDNs or local script blockers.</p>
      <div id="error-details" class="bg-black/40 p-4 rounded-lg font-mono text-xs text-red-400 overflow-x-auto mb-6 max-h-40"></div>
      <button onclick="window.location.reload()" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium transition-colors">
        <i class="fa-solid fa-rotate-right mr-2"></i> Reload App
      </button>
    </div>
  </div>

  <div id="root"></div>

  <script>
    window.addEventListener('error', function(e) {
      console.error("Captured Error:", e);
      const fallback = document.getElementById('error-fallback');
      const details = document.getElementById('error-details');
      if (fallback && details) {
        fallback.classList.remove('hidden');
        details.textContent = `${e.message}\nLine: ${e.lineno}:${e.colno}\nFile: ${e.filename}`;
      }
    });
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const APP_VERSION = "v2.0.2";

    const isMediaSource = (url) => {
      if (!url) return false;
      return /(youtube\.com|youtu\.be|vimeo\.com|tiktok\.com|twitch\.tv|dailymotion\.com|spotify\.com|soundcloud\.com|\.(mp4|webm|ogg|mov|mp3|wav|m4a)$)/i.test(url);
    };

    const getEmbedUrl = (url) => {
      if (!url) return null;
      let match;
      match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))((\w|-){11})/);
      if (match && match[1]) return `https://www.youtube.com/embed/${match[1]}`;
      match = url.match(/vimeo\.com\/(?:video\/)?([0-9]+)/);
      if (match && match[1]) return `https://player.vimeo.com/video/${match[1]}`;
      return null;
    };

    const parseMarkdown = (content) => {
      if (typeof marked !== 'undefined' && marked.parse) {
        return marked.parse(content || '');
      }
      return (content || '')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/\n/g, '<br />');
    };

    const parseMarkdownInline = (content) => {
      if (typeof marked !== 'undefined' && marked.parseInline) {
        return marked.parseInline(content || '');
      }
      return content || '';
    };

    const injectReferences = (text, allEntries) => {
      if (!text) return '';
      return text.replace(/\[\[kb-ref:([^\]]+)\]\]/g, (match, entryId) => {
        const refEntry = allEntries.find(e => e.id === entryId);
        if (!refEntry) return `<span class="text-red-500 dark:text-red-400 text-xs font-semibold bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 px-2 py-1 rounded">[Broken Link: ${entryId}]</span>`;

        const isMedia = isMediaSource(refEntry.sourceUrl);
        return `<span class="kb-embedded-ref cursor-pointer text-indigo-600 hover:text-indigo-800 dark:text-indigo-400 dark:hover:text-indigo-300 font-semibold px-1 mx-1 bg-indigo-50 hover:bg-indigo-100 dark:bg-indigo-900/30 dark:hover:bg-indigo-900/50 rounded transition-colors" data-id="${refEntry.id}" title="${refEntry.title}">[Ref: ${refEntry.numericId}]</span>`;
      });
    };

    const INITIAL_ENTRY = {
      id: 'sample-1',
      title: `Welcome to your AI Knowledge Base (${APP_VERSION})`,
      summary: 'A quick guide on how to use your new offline-first AI tool.',
      shortVersion: [
        'Drag and drop text or web links into the top-left drop zone.',
        'Everything saves automatically to your linked local file.',
        'Switch workspaces to manage different JSON files.',
        'Chat directly with your documents below.'
      ],
      fullContent: 'Welcome! This version runs entirely in your browser and syncs directly to a file on your hard drive.\n\n### Markdown Support\n* Use **Markdown** to edit your notes.\n* Drag and drop URLs; the scraper will automatically convert web pages into clean Markdown for you.',
      categories: ['getting started'],
      tags: ['tutorial'],
      projects: [],
      numericId: 1,
      createdAt: Date.now(),
      updatedAt: Date.now(),
      sourceUrl: null,
      references: [],
      pinned: false
    };

    const normalizeTaxonomy = (entries) => {
      return entries.map(e => ({
        ...e,
        categories: Array.isArray(e.categories) ? [...new Set(e.categories.map(c => c.toLowerCase()))] : [],
        tags: Array.isArray(e.tags) ? [...new Set(e.tags.map(t => t.toLowerCase()))] : [],
        projects: Array.isArray(e.projects) ? [...new Set(e.projects.map(p => p.toLowerCase()))] : []
      }));
    };

    const fetchAndScrubUrl = async (urlString) => {
      let html = '';
      try {
        const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(urlString)}`);
        const data = await response.json();
        if (data.contents) html = data.contents;
        else throw new Error("Invalid proxy response");
      } catch (err) {
        try {
          const response2 = await fetch(`https://corsproxy.io/?${encodeURIComponent(urlString)}`);
          if (!response2.ok) throw new Error("Network response failed");
          html = await response2.text();
        } catch (err2) {
          throw new Error("Scrape blocked. Falling back to search.");
        }
      }
      
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      
      let originalTitle = doc.querySelector('meta[property="og:title"]')?.getAttribute('content') || 
                          doc.querySelector('title')?.textContent || 
                          doc.querySelector('h1')?.textContent || 
                          "Untitled Page";
      originalTitle = originalTitle.trim().replace(/\s*[|•-]\s*([A-Za-z0-9 ]+Substack|[A-Za-z0-9 ]+Medium|[A-Za-z0-9 ]+Blog|[A-Za-z0-9 ]+HQ|QUT.*)$/i, '').trim();

      const unwanted = doc.querySelectorAll('script, style, noscript, iframe, svg, video, header, footer, nav, aside, form, .menu, .mega-menu, .global-nav, .navbar');
      unwanted.forEach(el => el.remove());
      
      let mainNode = doc.querySelector('.profile-details') || doc.querySelector('article') || doc.querySelector('main') || doc.body;
      
      let markdownContent = '';
      if (typeof TurndownService !== 'undefined') {
        const turndownService = new TurndownService({ headingStyle: 'atx', codeBlockStyle: 'fenced' });
        markdownContent = turndownService.turndown(mainNode);
      } else {
        markdownContent = mainNode.innerText || mainNode.textContent || '';
      }
      
      if (!markdownContent || markdownContent.length < 50) throw new Error("No text found. Falling back to search.");
      return { title: originalTitle, content: markdownContent.substring(0, 50000) }; 
    };

    async function verifyPermission(fileHandle, readWrite) {
      const options = { mode: readWrite ? 'readwrite' : 'read' };
      if ((await fileHandle.queryPermission(options)) === 'granted') return true;
      if ((await fileHandle.requestPermission(options)) === 'granted') return true;
      return false;
    }

    const readFileAsBase64 = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const callGemini = async (key, payload, model) => {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
      const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      const result = await response.json();
      
      if (result.error) throw new Error(result.error.message);
      if (!result.candidates || result.candidates.length === 0) {
        const reason = result.promptFeedback?.blockReason || "Empty response from API";
        throw new Error(`AI rejected the prompt. Reason: ${reason}`);
      }
      return result;
    };

    function KnowledgeApp() {
      const [appState, setAppState] = useState('init'); 
      const [savedHandle, setSavedHandle] = useState(null);
      const [fileHandle, setFileHandle] = useState(null);
      const [fileName, setFileName] = useState('');
      const [lastSyncTime, setLastSyncTime] = useState(Date.now());
      
      const [historyState, setHistoryState] = useState({ past: [], present: [] });
      const entries = historyState.present;
      
      const setEntries = (action) => {
          setHistoryState(h => {
              const nextPresent = typeof action === 'function' ? action(h.present) : action;
              if (nextPresent === h.present) return h;
              return {
                  past: [...h.past, h.present].slice(-30),
                  present: nextPresent
              };
          });
      };

      const undoEntries = () => {
          setHistoryState(h => {
              if (h.past.length === 0) return h;
              const previous = h.past[h.past.length - 1];
              const newPast = h.past.slice(0, h.past.length - 1);
              return { past: newPast, present: previous };
          });
      };

      useEffect(() => {
          const handleKeyDown = (e) => {
              if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z' && !e.shiftKey) {
                  if (['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement?.tagName)) return;
                  e.preventDefault();
                  undoEntries();
              }
          };
          window.addEventListener('keydown', handleKeyDown);
          return () => window.removeEventListener('keydown', handleKeyDown);
      }, []);

      const [chats, setChats] = useState({});
      const [apiKeys, setApiKeys] = useState([]);
      const [model, setModel] = useState('gemini-3.5-flash');
      const [availableModels, setAvailableModels] = useState([
        { id: 'gemini-3.5-pro', name: 'Gemini 3.5 Pro', group: 'Advanced Reasoning (Pro / Thinking)' },
        { id: 'gemini-3.5-flash', name: 'Gemini 3.5 Flash', group: 'Fast & Versatile (Flash)' },
        { id: 'gemini-3.1-pro', name: 'Gemini 3.1 Pro', group: 'Advanced Reasoning (Pro / Thinking)' },
        { id: 'gemini-2.5-pro', name: 'Gemini 2.5 Pro', group: 'Advanced Reasoning (Pro / Thinking)' },
        { id: 'gemini-2.0-flash-thinking-exp-01-21', name: 'Gemini 2.0 Flash Thinking', group: 'Advanced Reasoning (Pro / Thinking)' },
        { id: 'gemini-3.1-flash', name: 'Gemini 3.1 Flash', group: 'Fast & Versatile (Flash)' },
        { id: 'gemini-3.1-flash-lite', name: 'Gemini 3.1 Flash Lite', group: 'Fast & Versatile (Flash)' },
        { id: 'gemini-2.5-flash', name: 'Gemini 2.5 Flash', group: 'Fast & Versatile (Flash)' },
        { id: 'gemini-1.5-flash', name: 'Gemini 1.5 Flash', group: 'Fast & Versatile (Flash)' }
      ]);

      const ensureModelInList = (modelId) => {
        if (!modelId) return;
        setAvailableModels(prev => {
          if (prev.some(m => m.id === modelId)) return prev;
          const isPro = modelId.includes('pro') || modelId.includes('thinking');
          const group = isPro ? 'Advanced Reasoning (Pro / Thinking)' : 'Fast & Versatile (Flash)';
          const name = modelId
            .split('-')
            .map(word => word.charAt(0).toUpperCase() + word.slice(1))
            .join(' ');
          return [...prev, { id: modelId, name, group }];
        });
      };
      const [apiUsage, setApiUsage] = useState({ requests: 0, tokensInTotal: 0, tokensOutTotal: 0, logs: [] });
      
      const [showKeyModal, setShowKeyModal] = useState(false);
      const [showManual, setShowManual] = useState(false);
      const [showUsageModal, setShowUsageModal] = useState(false);
      const [isChatOpen, setIsChatOpen] = useState(false);
      
      const [isLeftSidebarOpen, setIsLeftSidebarOpen] = useState(true);
      const [isListSidebarOpen, setIsListSidebarOpen] = useState(true);
      const [tempKeys, setTempKeys] = useState([]);
      const [tempModel, setTempModel] = useState('');
      
      const [activeProjects, setActiveProjects] = useState([]);
      const [activeCategories, setActiveCategories] = useState([]);
      const [activeTags, setActiveTags] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedEntryIds, setSelectedEntryIds] = useState([]);
      const [chatScope, setChatScope] = useState('selected');
      const [showAIChats, setShowAIChats] = useState(true);
      
      const [editingEntries, setEditingEntries] = useState({});
      const [editData, setEditData] = useState({});
      const [editCatInput, setEditCatInput] = useState({});
      const [editTagInput, setEditTagInput] = useState({});
      const [editProjectInput, setEditProjectInput] = useState({});

      const [addInput, setAddInput] = useState('');
      const [isDragging, setIsDragging] = useState(false);
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [error, setError] = useState(null);
      
      const [chatInput, setChatInput] = useState('');
      const [isChatting, setIsChatting] = useState(false);
      const chatScrollRef = useRef(null);
      const sourceCacheRef = useRef({});
      
      const [taxonomyInput, setTaxonomyInput] = useState('');
      const [isTaxonomyProcessing, setIsTaxonomyProcessing] = useState(false);

      const [dragOverEntryId, setDragOverEntryId] = useState(null);
      const [editingTitleId, setEditingTitleId] = useState(null);
      const [tempTitle, setTempTitle] = useState('');
      const [showAIActionsId, setShowAIActionsId] = useState(null);
      const [showTaxonomyManager, setShowTaxonomyManager] = useState(false);
      const [showWorkspaceOptions, setShowWorkspaceOptions] = useState(false);
      const [workspaceOverview, setWorkspaceOverview] = useState({ content: '', lastUpdated: 0 });
      const [hoveredRef, setHoveredRef] = useState(null);

      const handleGeminiCall = async (payload, customModel) => {
         if (!apiKeys || apiKeys.length === 0) throw new Error("Please set your Gemini API key in Settings.");
         
         const keyIndex = apiUsage.requests % apiKeys.length;
         const selectedKeyObj = apiKeys[keyIndex];
         const selectedKey = selectedKeyObj.key;
         const activeModel = customModel || model;
         
         const payloadStr = JSON.stringify(payload);
         const estTokensIn = Math.ceil(payloadStr.length / 4);
         
         const result = await callGemini(selectedKey, payload, activeModel);
         
         const responseStr = JSON.stringify(result);
         const estTokensOut = Math.ceil(responseStr.length / 4);
         
         setApiUsage(prev => {
             const newLog = { time: new Date().toLocaleTimeString(), model: activeModel, keyName: selectedKeyObj.name, tokensIn: estTokensIn, tokensOut: estTokensOut };
             return {
                 ...prev,
                 requests: prev.requests + 1,
                 tokensInTotal: (prev.tokensInTotal || 0) + estTokensIn,
                 tokensOutTotal: (prev.tokensOutTotal || 0) + estTokensOut,
                 logs: [newLog, ...(prev.logs || [])].slice(0, 100)
             };
         });
         
         setApiKeys(prev => prev.map(k => k.id === selectedKeyObj.id ? {
             ...k,
             requests: (k.requests || 0) + 1,
             tokensIn: (k.tokensIn || 0) + estTokensIn,
             tokensOut: (k.tokensOut || 0) + estTokensOut
         } : k));
         
         return result;
      };

      useEffect(() => {
        if (typeof idbKeyval !== 'undefined') {
          idbKeyval.get('kb_file_handle').then(handle => {
            if (handle) setSavedHandle(handle);
            setAppState('landing');
          }).catch(err => {
            console.error("IndexDB failed:", err);
            setAppState('landing');
          });
        } else {
          setAppState('landing');
        }
      }, []);

      useEffect(() => {
         if (appState !== 'workspace' || !apiKeys || apiKeys.length === 0) return;
         if (entries.length === 0) return;

         const maxEntryUpdate = Math.max(...entries.map(e => e.updatedAt || e.createdAt || 0));
         
         if (maxEntryUpdate > workspaceOverview.lastUpdated) {
             const timer = setTimeout(async () => {
                 try {
                     const candidateEntries = entries.filter(e => !e.isCombined && !e.isGlobalChat);
                     if (candidateEntries.length === 0) return;
                     
                     const summariesText = candidateEntries.map(e => `[kb-ref:${e.id}]\nTitle: ${e.title}\nSummary: ${e.summary}`).join('\n\n');
                     
                     const payload = {
                         contents: [{ role: 'user', parts: [{ text: `Analyze these knowledge base summaries and provide a high-level "Snapshot Overview" of the entire database. Identify the top 3 most prominent topics or threads. Draw interesting connections between them. Write in short, poignant paragraphs (2-3 sentences max per paragraph). You MUST reference specific notes inline using the syntax [[kb-ref:ID]] when you mention them.\n\nSummaries:\n${summariesText}` }] }],
                         systemInstruction: { parts: [{ text: `You are an AI generating a high-level dashboard overview for the user. Be concise, poignant, and highlight what's interesting. Draw connections between concepts. Use short paragraphs. CRITICAL: Use [[kb-ref:ID]] syntax for all references.` }] },
                         generationConfig: { temperature: 0.5 }
                     };
                     
                     const result = await handleGeminiCall(payload, model);
                     const content = result.candidates[0].content.parts[0].text;
                     
                     setWorkspaceOverview({
                         content: content,
                         lastUpdated: Date.now()
                     });
                 } catch (err) {
                     console.error("Failed to generate workspace overview", err);
                 }
             }, 5000);
             
             return () => clearTimeout(timer);
         }
      }, [appState, apiKeys, entries, workspaceOverview.lastUpdated, model]);

      useEffect(() => {
        if (appState !== 'workspace' || !fileHandle) return;
        const timer = setTimeout(async () => {
          try {
            const hasPerm = await verifyPermission(fileHandle, true);
            if (!hasPerm) return;

            const file = await fileHandle.getFile();
            const currentDiskModified = file.lastModified;

            let dataToWrite = { entries, chats, apiKeys, model, apiUsage, workspaceOverview };
            let stateMerged = false;

            if (currentDiskModified > lastSyncTime) {
                const diskText = await file.text();
                if (diskText.trim()) {
                    const diskData = JSON.parse(diskText);
                    const diskEntries = diskData.entries || [];
                    
                    const mergedMap = new Map();
                    diskEntries.forEach(e => mergedMap.set(e.id, e));
                    
                    entries.forEach(localE => {
                        const diskE = mergedMap.get(localE.id);
                        if (!diskE || (localE.updatedAt || localE.createdAt || 0) >= (diskE.updatedAt || diskE.createdAt || 0)) {
                            mergedMap.set(localE.id, localE);
                        }
                    });
                    
                    dataToWrite.entries = Array.from(mergedMap.values());
                    
                    const mergedChats = { ...diskData.chats };
                    Object.keys(chats).forEach(id => {
                        if (!mergedChats[id] || chats[id].length >= mergedChats[id].length) {
                            mergedChats[id] = chats[id];
                        }
                    });
                    dataToWrite.chats = mergedChats;
                    stateMerged = true;
                }
            }

            const writable = await fileHandle.createWritable();
            await writable.write(JSON.stringify(dataToWrite, null, 2));
            await writable.close();

            const updatedFile = await fileHandle.getFile();
            setLastSyncTime(updatedFile.lastModified);

            if (stateMerged) {
                setHistoryState(prev => ({ ...prev, present: dataToWrite.entries }));
                setChats(dataToWrite.chats);
            }

          } catch (err) {
            console.error("Auto-save sync failed:", err);
          }
        }, 1500);
        return () => clearTimeout(timer);
      }, [entries, chats, apiKeys, model, apiUsage, appState, fileHandle]);

      const ensureNumericIds = (loadedEntries) => {
        let maxId = loadedEntries.reduce((max, e) => Math.max(max, e.numericId || 0), 0);
        return loadedEntries.map(e => {
          if (!e.numericId) {
            maxId += 1;
            return { ...e, numericId: maxId };
          }
          return e;
        });
      };

      const processLoadedEntries = (entries) => {
        return normalizeTaxonomy(ensureNumericIds(entries));
      };

      const migrateWorkspaceData = (data) => {
        let migratedEntries = [];
        if (data.entries && Array.isArray(data.entries)) {
          migratedEntries = processLoadedEntries(data.entries).map(e => ({
            ...e,

      const handleTaxonomyCommand = async (e) => {

          {
            "categoryChanges": [{"old": "OldName", "new": "NewName"}],
            "categoryDeletions": ["NameToRemove"],
            "tagChanges": [{"old": "OldName", "new": "NewName"}],
            "tagDeletions": ["NameToRemove"]
          }`;

          const schema = {
            type: "OBJECT",
            properties: {
              categoryChanges: { type: "ARRAY", items: { type: "OBJECT", properties: { old: { type: "STRING" }, new: { type: "STRING" } } } },
              categoryDeletions: { type: "ARRAY", items: { type: "STRING" } },
              tagChanges: { type: "ARRAY", items: { type: "OBJECT", properties: { old: { type: "STRING" }, new: { type: "STRING" } } } },

            generationConfig: { responseMimeType: "application/json", responseSchema: schema }
          };
          
          const result = await handleGeminiCall(payload, model);

          setEntries(prev => prev.map(entry => {
            let newCats = [...(Array.isArray(entry.categories) ? entry.categories : [])];
            let newTags = [...(Array.isArray(entry.tags) ? entry.tags : [])];
            let wasModified = false;

            if (data.categoryChanges) {
              data.categoryChanges.forEach(change => {
                if (newCats.includes(change.old)) {
                  newCats = newCats.filter(c => c !== change.old);
                  if (change.new && !newCats.includes(change.new)) newCats.push(change.new.toLowerCase());
                  wasModified = true;
                }
              });
            }
            if (data.categoryDeletions && data.categoryDeletions.length > 0) {
              const startLen = newCats.length;
              newCats = newCats.filter(c => !data.categoryDeletions.includes(c));
              if (newCats.length !== startLen) wasModified = true;
            }

            if (data.tagChanges) {
              data.tagChanges.forEach(change => {
                if (newTags.includes(change.old)) {
                  newTags = newTags.filter(t => t !== change.old);

              if (newTags.length !== startLen) wasModified = true;
            }

            if (wasModified) {
                return {

                  tags: [...new Set(newTags.map(t => t.toLowerCase()))],

      const handleCategoryClick = (cat, e) => {
        if (e.ctrlKey || e.metaKey) {
          setActiveCategories(prev => prev.includes(cat) ? prev.filter(c => c !== cat) : [...prev, cat]);
        } else {
          setActiveCategories([cat]);
        }
      };



      const handleProjectClick = (proj, e) => {
        if (e.ctrlKey || e.metaKey) {
          setActiveProjects(prev => prev.includes(proj) ? prev.filter(p => p !== proj) : [...prev, proj]);
        } else {
          setActiveProjects([proj]);
        }
      };

      const handleTagClick = (tag, e) => {
        if (e.ctrlKey || e.metaKey) {
          setActiveTags(prev => prev.includes(tag) ? prev.filter(t => t !== tag) : [...prev, tag]);
        } else {
          setActiveTags([tag]);
        }
      };

      const togglePin = (e, id) => {
        e.stopPropagation();
        setEntries(prev => prev.map(ent => ent.id === id ? { ...ent, pinned: !ent.pinned, updatedAt: Date.now() } : ent));
      };

      const handleContentClick = (e) => {
        const refEl = e.target.closest('.kb-embedded-ref');
        if (refEl) {
          const refId = refEl.getAttribute('data-id');
          if (refId && !selectedEntryIds.includes(refId)) {
            setSelectedEntryIds(prev => [...prev, refId]);
          }
        }
      };

      const handleContentMouseOver = (e) => {
        const refEl = e.target.closest('.kb-embedded-ref');
        if (refEl) {
          const refId = refEl.getAttribute('data-id');
          if (refId) {
            const rect = refEl.getBoundingClientRect();
            setHoveredRef({ id: refId, x: rect.left + rect.width / 2, y: rect.top });
          }
        }
      };

      const handleContentMouseOut = (e) => {
        const refEl = e.target.closest('.kb-embedded-ref');
        if (refEl) {
          setHoveredRef(null);
        }
      };

      const handleContentDrop = (e, targetEntry) => {
        const draggedId = e.dataTransfer.getData('kb-ref-id');
        if (draggedId && draggedId !== targetEntry.id) {
          e.preventDefault();
          const refShortcode = `\n\n[[kb-ref:${draggedId}]]`;
          setEntries(prev => prev.map(ent => 
            ent.id === targetEntry.id 
            ? { ...ent, fullContent: (ent.fullContent || '') + refShortcode, updatedAt: Date.now() }
            : ent
          ));
        }
      };

      const handleEntryDrop = (e, targetId) => {
        e.preventDefault();
        setDragOverEntryId(null);
        let handledTaxonomy = false;
        
        const taxData = e.dataTransfer.getData('kb-tax');
        if (taxData) {
          const { type, val } = JSON.parse(taxData);
          setEntries(prev => prev.map(ent => {
            if (ent.id === targetId) {
              if (type === 'cat' && !(ent.categories || []).includes(val)) return { ...ent, categories: [...(ent.categories || []), val.toLowerCase()], updatedAt: Date.now() };
              if (type === 'tag' && !(ent.tags || []).includes(val)) return { ...ent, tags: [...(ent.tags || []), val.toLowerCase()], updatedAt: Date.now() };
              if (type === 'proj' && !(ent.projects || []).includes(val)) return { ...ent, projects: [...(ent.projects || []), val.toLowerCase()], updatedAt: Date.now() };
            }
            return ent;
          }));
          handledTaxonomy = true;
        }

        const removeTaxData = e.dataTransfer.getData('kb-tax-remove');
        if (removeTaxData && handledTaxonomy) {
          const { entryId, type, val } = JSON.parse(removeTaxData);
          if (entryId !== targetId) {
            setEntries(prev => prev.map(ent => {
              if (ent.id === entryId) {
                if (type === 'cat') return { ...ent, categories: (ent.categories || []).filter(c => c !== val), updatedAt: Date.now() };
                if (type === 'tag') return { ...ent, tags: (ent.tags || []).filter(t => t !== val), updatedAt: Date.now() };
                if (type === 'proj') return { ...ent, projects: (ent.projects || []).filter(p => p !== val), updatedAt: Date.now() };
              }
              return ent;
            }));
          }
        }

        const draggedId = e.dataTransfer.getData('kb-ref-id');
        if (draggedId && draggedId !== targetId) {
          setEntries(prev => prev.map(ent => {
            if (ent.id === targetId) {
              const refs = ent.references || [];
              if (!refs.includes(draggedId)) {
                return { ...ent, references: [...refs, draggedId], updatedAt: Date.now() };
              }
            }
            return ent;
          }));
        }
      };

      const removeReferenceFromEdit = (id, refIdToRemove) => {
        setEditData(prev => ({

                    <h3>1. Welcome to your Workspace</h3>
                    <p>This application is designed to be <strong>offline-first</strong>. All your notes, categories, and settings are saved directly to a local JSON file on your computer. You retain complete ownership of your data.</p>
                    
                    <h3>2. Getting Started & API Key</h3>
                    <p>To use the AI features (summarizing links, generating tags, and chatting), you must provide a <strong>Google Gemini API Key</strong>. Click the gear icon <i className="fa-solid fa-gear"></i> in the top left sidebar to enter your key.</p>

                    <h3>3. Adding Content</h3>
                    <p>The fastest way to add content is to drag and drop text, a URL, or a PDF file directly into the <strong>"Add New Entry"</strong> cloud area in the left sidebar, or paste a link into the input field below it.</p>
                    <ul>
                      <li><strong>Web Links:</strong> Drag or paste an article URL. The AI will scrape it, generate a clean Markdown version, title it, summarize it, and tag it.</li>
                      <li><strong>YouTube Videos:</strong> Drag a YouTube URL. The AI will search for transcripts/summaries and create detailed notes for you.</li>
                      <li><strong>PDF Documents:</strong> Drag and drop a PDF file. The AI will read the document and generate comprehensive notes.</li>
                      <li><strong>Raw Text:</strong> Drop or paste any text block to have it instantly formatted and categorized.</li>
                    </ul>

                    <h3>4. Organization: Categories vs. Tags</h3>
                    <p>The system uses a strict two-tier taxonomy:</p>
                    <ul>
                      <li><strong>Categories:</strong> Broad domains (e.g., "technology", "finance"). Notes usually have 1-2 categories.</li>
                      <li><strong>Tags:</strong> Specific, granular concepts or author names (e.g., "artificial intelligence", "sam altman").</li>
                    </ul>
                    <p><strong>Drag and Drop Management:</strong> You can drag a category or tag from the left sidebar directly onto a note card to apply it. To remove a tag, simply click and drag it <em>off</em> the note card.</p>

                    <h3>5. Chatting with your Documents</h3>
                    <p>The bottom right section is your AI chat interface. You can ask questions based entirely on your saved documents.</p>
                    <ul>
                      <li><strong>Scope:</strong> Select your target notes (Cmd/Ctrl + Click to select multiple).</li>
                      <li><strong>Combined Views:</strong> Querying multiple documents generates a temporary "Combined Session" note, allowing you to save the insights from that specific conversation.</li>
                    </ul>

                    <h3>6. Editing & AI Assistance</h3>
                    <p>Click the pencil icon <i className="fa-solid fa-pen"></i> on any note to enter Edit Mode. Here you can write in Markdown. If you get stuck, use the magic buttons to have AI write your summaries, extract takeaways, or find links to other notes based on your text.</p>
                  </div>
                </div>
              </div>
            )}
          </div>
        );

        const matchesProject = activeProjects.length === 0 || (Array.isArray(entry.projects) && entry.projects.some(p => activeProjects.includes(p)));

        const matchesTag = activeTags.length === 0 || (Array.isArray(entry.tags) && entry.tags.some(t => activeTags.includes(t)));
        const searchLower = searchQuery.toLowerCase();
        const matchesSearch = !searchQuery || 
                              (entry.title && entry.title.toLowerCase().includes(searchLower)) || 
                              (entry.summary && entry.summary.toLowerCase().includes(searchLower));
        return matchesProject && matchesCat && matchesTag && matchesSearch;

      const isCombinedView = activeSingleEntry?.isCombined;
      const entriesToDisplay = isCombinedView

          : selectedEntries;

      return (

          onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
          onDragLeave={(e) => { e.preventDefault(); if (e.relatedTarget === null) setIsDragging(false); }}

        >

                <p className="text-slate-500 dark:text-slate-400">Drag text, URL, or PDF here</p>

          {showKeyModal && (

                    <button type="button" onClick={() => setTempKeys([...tempKeys, { id: 'k'+Date.now(), name: 'Key '+(tempKeys.length+1), key: '', requests: 0, tokensIn: 0, tokensOut: 0 }])} className="text-xs text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 font-medium"><i className="fa-solid fa-plus mr-1"></i> Add Key</button>

                        <input type="password" value={k.key} onChange={e => { const newKeys = [...tempKeys]; newKeys[i].key = e.target.value; setTempKeys(newKeys); }} className="flex-1 px-2 py-1.5 text-sm border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded focus:outline-none focus:ring-1 focus:ring-indigo-500" placeholder="AIzaSy..." />
                        <button type="button" onClick={() => setTempKeys(tempKeys.filter(tk => tk.id !== k.id))} className="text-slate-400 hover:text-red-500 transition-colors p-1"><i className="fa-solid fa-trash-can"></i></button>
                      </div>

                    {tempKeys.length === 0 && <div className="text-xs text-slate-500 dark:text-slate-400 text-center py-2 italic">No API keys. Add one to use AI features.</div>}

                <div className="mb-6">

                                    value={editProjectInput[entry.id] || ''}
                                    onChange={e => setEditProjectInput(prev => ({...prev, [entry.id]: e.target.value}))}
                                    onKeyDown={(e) => handleAddEditProject(entry.id, e)}
                                    placeholder="Add project (Enter or comma)"
                                    className="w-full px-3 py-2 border border-amber-200 dark:border-amber-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 text-base bg-white dark:bg-slate-800 dark:text-white lowercase"
                                  />
                                  <datalist id="proj-suggestions">
                                    {Array.from(allProjects).map(p => <option key={p} value={p} />)}
                                  </datalist>
                                </div>
                                <div>
                                  <label className="block text-xs font-semibold text-indigo-500 dark:text-indigo-400 mb-1">Tags</label>
                                  <div className="flex flex-wrap gap-1 mb-2">
                                    {data.tags.map(t => (
                                      <span key={t} className="group relative flex items-center px-2.5 py-1 bg-slate-100 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-300 text-[10px] font-medium lowercase rounded-full shadow-sm">
                                        {t}
                                        <button type="button" onClick={() => removeEditTag(entry.id, t)} className="ml-1.5 opacity-0 group-hover:opacity-100 transition-opacity hover:text-red-400">
                                          <i className="fa-solid fa-xmark"></i>
                                        </button>
                                      </span>
                                    ))}
                                  </div>
                                  <input 
                                    type="text"
                                    list="tag-suggestions"
                                    value={tagInput}
                                    onChange={e => setEditTagInput(prev => ({...prev, [entry.id]: e.target.value}))}
                                    onKeyDown={(e) => handleAddEditTag(entry.id, e)}
                                    placeholder="Add tag (Enter or comma)"
                                    className="w-full px-3 py-2 border border-indigo-200 dark:border-indigo-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-base bg-white dark:bg-slate-800 dark:text-white lowercase"
                                  />
                                  <datalist id="tag-suggestions">
                                    {Array.from(allTags).map(t => <option key={t} value={t} />)}
                                  </datalist>
                                </div>
                              </div>
                            </div>

                            {!entry.isGlobalChat && (
                              <div>
                                <label className="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Expanded Summary (Markdown)</label>
                                <textarea 
                                  value={data.fullContent} 
                                  onChange={e => setEditData(prev => ({...prev, [entry.id]: {...prev[entry.id], fullContent: e.target.value}}))} 
                                  onDragOver={(e) => e.stopPropagation()}
                                  onDrop={(e) => {
                                    e.stopPropagation();
                                    const draggedId = e.dataTransfer.getData('kb-ref-id');
                                    if (draggedId && draggedId !== entry.id) {
                                      const el = e.target;
                                      setTimeout(() => {
                                        setEditData(prev => {
                                          const currentEditData = prev[entry.id] || { fullContent: '', references: [] };
                                          return {
                                            ...prev,
                                            [entry.id]: {
                                              ...currentEditData,
                                              fullContent: el.value,
                                              references: currentEditData.references.includes(draggedId) ? currentEditData.references : [...currentEditData.references, draggedId]
                                            }
                                          };
                                        });
                                      }, 50);
                                    }
                                  }}
                                  className="w-full h-96 px-4 py-3 border border-slate-300 dark:border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-base leading-relaxed bg-white dark:bg-slate-800 dark:text-white" 
                                  placeholder="Start writing Expanded Summary in Markdown...&#10;&#10;(Tip: You can drag and drop other notes directly into this text box to create inline references!)"
                                ></textarea>
                              </div>
                            )}

                            {data.references && data.references.length > 0 && (
                              <div className="p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700">
                                <h3 className="text-base font-bold text-slate-700 dark:text-slate-300 mb-3">Linked References</h3>
                                <div className="space-y-2">
                                  {data.references.map(refId => {
                                    const refEnt = entries.find(e => e.id === refId);
                                    if (!refEnt) return null;
                                    const isMediaRef = isMediaSource(refEnt.sourceUrl);
                                    return (
                                      <div key={refId} className={`flex justify-between items-center text-base p-3 rounded-lg border shadow-sm ${isMediaRef ? 'bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-800' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700'}`}>
                                        <span className={`font-medium truncate mr-4 ${isMediaRef ? 'text-red-900 dark:text-red-300' : 'text-slate-700 dark:text-slate-300'}`}><span className={`font-normal mr-1 ${isMediaRef ? 'text-red-500' : 'text-slate-500'}`}>{refEnt.numericId}:</span>{refEnt.title}</span>
                                        <button type="button" onClick={() => removeReferenceFromEdit(entry.id, refId)} className="text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 px-2 py-1 rounded transition-colors text-xs font-semibold uppercase tracking-wide">Remove</button>
                                      </div>
                                    );
                                  })}
                                </div>
                              </div>
                            )}
                          </div>
                        </div>
                      ) : (
                        <div className="max-w-3xl min-w-[500px] mx-auto p-4 md:p-8 pb-32 min-h-full">
                          <div className="flex justify-between items-start mb-6">
                            <div className="flex-1 pr-4">
                              <h1 className="text-4xl font-serif font-semibold mb-3 text-stone-900 dark:text-stone-100 tracking-tight leading-tight">
                                {entry.title || 'Untitled'}
                              </h1>
                              <div className="flex flex-wrap items-center gap-2">
                                {Array.isArray(entry.projects) && entry.projects.map(p => <span key={p} className="text-xs font-medium text-amber-600 dark:text-amber-300 bg-amber-50 dark:bg-amber-900/30 border border-amber-100 dark:border-amber-800 px-2.5 py-1 rounded-full lowercase"><i className="fa-solid fa-folder-open mr-1"></i>{p}</span>)}
                                {Array.isArray(entry.categories) && entry.categories.map(c => <span key={c} className="text-xs font-medium text-indigo-600 dark:text-indigo-300 bg-indigo-50 dark:bg-indigo-900/30 border border-indigo-100 dark:border-indigo-800 px-2.5 py-1 rounded-full lowercase">{c}</span>)}
                                {Array.isArray(entry.tags) && entry.tags.map(t => <span key={t} className="text-xs font-medium text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-2.5 py-1 rounded-full lowercase">#{t}</span>)}
                                {entry.sourceUrl && <a href={entry.sourceUrl} target="_blank" rel="noopener noreferrer" className="text-xs font-semibold text-white bg-indigo-600 hover:bg-indigo-700 px-2.5 py-1 rounded-full flex items-center gap-1.5 transition-colors shadow-sm"><i className="fa-solid fa-arrow-up-right-from-square text-[10px]"></i> Source</a>}
                              </div>
                            </div>
                            {(!isCombinedView || selectedEntryIds.length > 1) && (
                              <div className="flex gap-2 flex-shrink-0">
                                <button onClick={() => startEditing(entry)} className="text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 p-2 rounded hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-colors" title="Edit Note"><i className="fa-solid fa-pen"></i></button>
                                <button onClick={() => deleteEntry(entry.id)} className="text-slate-400 hover:text-red-500 dark:hover:text-red-400 p-2 rounded hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors" title="Delete Note"><i className="fa-solid fa-trash-can"></i></button>
                              </div>
                            )}
                          </div>
                          <p className="text-xl text-stone-500 dark:text-stone-400 mb-14 font-serif leading-relaxed">{entry.summary}</p>
                          
                          {Array.isArray(entry.shortVersion) && entry.shortVersion.length > 0 && (
                            <div className="bg-slate-50 dark:bg-slate-800/50 rounded-xl p-6 mb-8 border border-slate-100 dark:border-slate-700/50">
                              <h3 className="text-xs font-bold uppercase text-slate-400 dark:text-slate-500 mb-4">Key Takeaways</h3>
                              <ul className="space-y-2">
                                {entry.shortVersion.map((point, idx) => (
                                  <li key={idx} className="flex"><i className="fa-solid fa-chevron-right text-indigo-400 dark:text-indigo-500 mt-1 mr-2 text-base"></i><span className="text-base text-slate-700 dark:text-slate-300 prose-a:text-indigo-600 dark:prose-a:text-indigo-400 prose-a:underline" dangerouslySetInnerHTML={{ __html: parseMarkdownInline(point) }}></span></li>
                                ))}
                              </ul>
                            </div>
                          )}

                          {getEmbedUrl(entry.sourceUrl) && (
                            <div className="mb-8 aspect-video w-full rounded-xl overflow-hidden shadow-md border border-slate-200 dark:border-slate-700 bg-black">
                              <iframe src={getEmbedUrl(entry.sourceUrl)} className="w-full h-full" allowFullScreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
                            </div>
                          )}

                          <div className="relative mb-8">
                            <button 
                              onClick={() => setShowAIActionsId(showAIActionsId === entry.id ? null : entry.id)}
                              className="px-4 py-2 text-sm font-medium bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 border border-indigo-200 dark:border-indigo-700/50 rounded-lg hover:bg-indigo-100 dark:hover:bg-indigo-900/50 transition-colors shadow-sm flex items-center gap-2"
                            >
                              ✨ AI Actions <i className={`fa-solid fa-chevron-${showAIActionsId === entry.id ? 'up' : 'down'} text-xs`}></i>
                            </button>
                            
                            {showAIActionsId === entry.id && (
                              <div className="absolute top-full left-0 mt-2 w-80 bg-white dark:bg-slate-800 rounded-xl shadow-xl border border-slate-200 dark:border-slate-700 z-50 p-4 space-y-4">
                                <div>
                                  <h4 className="text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-2">Research & Analysis</h4>
                                  <div className="flex flex-wrap gap-2">
                                    <button onClick={() => { handleAITool(entry.id, 'link'); setShowAIActionsId(null); }} disabled={isAnalyzing} className="px-2 py-1 text-xs font-medium bg-slate-50 dark:bg-slate-900 text-slate-600 dark:text-slate-300 rounded hover:bg-indigo-50 dark:hover:bg-indigo-900/50 hover:text-indigo-600 transition-colors disabled:opacity-50">✨ Find Links</button>
                                    <button onClick={() => { handleAITool(entry.id, 'gaps'); setShowAIActionsId(null); }} disabled={isAnalyzing} className="px-2 py-1 text-xs font-medium bg-slate-50 dark:bg-slate-900 text-slate-600 dark:text-slate-300 rounded hover:bg-indigo-50 dark:hover:bg-indigo-900/50 hover:text-indigo-600 transition-colors disabled:opacity-50">✨ Find Gaps</button>
                                    <button onClick={() => { handleAITool(entry.id, 'bias'); setShowAIActionsId(null); }} disabled={isAnalyzing} className="px-2 py-1 text-xs font-medium bg-slate-50 dark:bg-slate-900 text-slate-600 dark:text-slate-300 rounded hover:bg-indigo-50 dark:hover:bg-indigo-900/50 hover:text-indigo-600 transition-colors disabled:opacity-50">✨ Bias/Tone</button>
                                    <button onClick={() => { handleAITool(entry.id, 'citations'); setShowAIActionsId(null); }} disabled={isAnalyzing} className="px-2 py-1 text-xs font-medium bg-slate-50 dark:bg-slate-900 text-slate-600 dark:text-slate-300 rounded hover:bg-indigo-50 dark:hover:bg-indigo-900/50 hover:text-indigo-600 transition-colors disabled:opacity-50">✨ Citations</button>
                                    <button onClick={() => { handleAITool(entry.id, 'counter'); setShowAIActionsId(null); }} disabled={isAnalyzing} className="px-2 py-1 text-xs font-medium bg-slate-50 dark:bg-slate-900 text-slate-600 dark:text-slate-300 rounded hover:bg-indigo-50 dark:hover:bg-indigo-900/50 hover:text-indigo-600 transition-colors disabled:opacity-50">✨ Counter-Args</button>
                                  </div>
                                </div>
                                <div>
                                  <h4 className="text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-2">Writing & Ideation</h4>
                                  <div className="flex flex-wrap gap-2">
                                    <button onClick={() => { handleAITool(entry.id, 'eli5'); setShowAIActionsId(null); }} disabled={isAnalyzing} className="px-2 py-1 text-xs font-medium bg-slate-50 dark:bg-slate-900 text-slate-600 dark:text-slate-300 rounded hover:bg-blue-50 dark:hover:bg-blue-900/50 hover:text-blue-600 transition-colors disabled:opacity-50">✨ Simplify</button>
                                    <button onClick={() => { handleAITool(entry.id, 'brainstorm'); setShowAIActionsId(null); }} disabled={isAnalyzing} className="px-2 py-1 text-xs font-medium bg-slate-50 dark:bg-slate-900 text-slate-600 dark:text-slate-300 rounded hover:bg-blue-50 dark:hover:bg-blue-900/50 hover:text-blue-600 transition-colors disabled:opacity-50">✨ Brainstorm</button>
                                    <button onClick={() => { handleAITool(entry.id, 'rewrite'); setShowAIActionsId(null); }} disabled={isAnalyzing} className="px-2 py-1 text-xs font-medium bg-slate-50 dark:bg-slate-900 text-slate-600 dark:text-slate-300 rounded hover:bg-blue-50 dark:hover:bg-blue-900/50 hover:text-blue-600 transition-colors disabled:opacity-50">✨ Rewrite</button>
                                    <button onClick={() => { handleAITool(entry.id, 'essay'); setShowAIActionsId(null); }} disabled={isAnalyzing} className="px-2 py-1 text-xs font-medium bg-slate-50 dark:bg-slate-900 text-slate-600 dark:text-slate-300 rounded hover:bg-blue-50 dark:hover:bg-blue-900/50 hover:text-blue-600 transition-colors disabled:opacity-50">✨ Essay</button>
                                  </div>
                                </div>
                                <div>
                                  <h4 className="text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-2">Productivity</h4>
                                  <div className="flex flex-wrap gap-2">
                                    <button onClick={() => { handleAITool(entry.id, 'actions'); setShowAIActionsId(null); }} disabled={isAnalyzing} className="px-2 py-1 text-xs font-medium bg-slate-50 dark:bg-slate-900 text-slate-600 dark:text-slate-300 rounded hover:bg-emerald-50 dark:hover:bg-emerald-900/50 hover:text-emerald-600 transition-colors disabled:opacity-50">✨ Actions</button>
                                    <button onClick={() => { handleAITool(entry.id, 'quiz'); setShowAIActionsId(null); }} disabled={isAnalyzing} className="px-2 py-1 text-xs font-medium bg-slate-50 dark:bg-slate-900 text-slate-600 dark:text-slate-300 rounded hover:bg-emerald-50 dark:hover:bg-emerald-900/50 hover:text-emerald-600 transition-colors disabled:opacity-50">✨ Quiz</button>
                                  </div>
                                </div>
                              </div>
                            )}
                          </div>

                          <div className="border-t border-stone-200/50 dark:border-stone-800/50 pt-12 mt-12"></div>
                          <div 
                            className="prose prose-claude dark:prose-invert prose-lg max-w-none text-stone-800 dark:text-stone-300 pb-12 prose-headings:font-serif prose-headings:font-semibold prose-a:text-claude-accent dark:prose-a:text-claude-accentdark prose-blockquote:border-l-claude-accent prose-blockquote:bg-stone-50 dark:prose-blockquote:bg-stone-900/50 prose-blockquote:py-2 prose-blockquote:px-6 prose-blockquote:rounded-r-xl prose-blockquote:text-stone-600 dark:prose-blockquote:text-stone-400 prose-blockquote:not-italic prose-li:marker:text-stone-400 leading-loose" 
                            dangerouslySetInnerHTML={{ __html: injectReferences(parseMarkdown(entry.fullContent || ''), entries) }} 
                            onClick={handleContentClick}
                            onMouseOver={handleContentMouseOver}
                            onMouseOut={handleContentMouseOut}
                            onDragOver={(e) => { e.preventDefault(); }}
                            onDrop={(e) => handleContentDrop(e, entry)}
                          />
                          
                          {Array.isArray(entry.references) && entry.references.length > 0 && (
                            <div className="mt-12 pt-8 border-t border-slate-100 dark:border-slate-800">
                              <h3 className="text-xs font-bold uppercase text-slate-400 dark:text-slate-500 mb-4 flex items-center"><i className="fa-solid fa-link mr-2"></i> Linked References</h3>
                              <div className="grid grid-cols-1 gap-3">
                                {entry.references.map(refId => {
                                  const refEntry = entries.find(e => e.id === refId);
                                  if (!refEntry) return null;
                                  const isMediaRef = isMediaSource(refEntry.sourceUrl);
                                  return (
                                    <div 
                                      key={refId} 
                                      onClick={() => setSelectedEntryIds(prev => prev.includes(refId) ? prev : [...prev, refId])} 
                                      className={`p-4 border rounded-xl cursor-pointer hover:shadow-md transition-all flex justify-between items-center group ${isMediaRef ? 'bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-800' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700'}`}
                                    >
                                      <div>
                                        <h4 className={`text-base font-semibold mb-1 transition-colors ${isMediaRef ? 'text-red-900 dark:text-red-300 group-hover:text-red-700 dark:group-hover:text-red-200' : 'text-slate-800 dark:text-slate-200 group-hover:text-indigo-700 dark:group-hover:text-indigo-400'}`}><span className={`font-normal mr-1 ${isMediaRef ? 'text-red-500' : 'text-slate-500'}`}>{refEntry.numericId}:</span>{refEntry.title}</h4>
                                        <p className={`text-base line-clamp-1 ${isMediaRef ? 'text-red-700 dark:text-red-400' : 'text-slate-500 dark:text-slate-400'}`}>{refEntry.summary}</p>
                                      </div>
                                      <i className={`fa-solid fa-arrow-right transition-colors ml-4 ${isMediaRef ? 'text-red-300 dark:text-red-700 group-hover:text-red-500 dark:group-hover:text-red-500' : 'text-slate-300 dark:text-slate-600 group-hover:text-indigo-400'}`}></i>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                    );
                  })}
                  </>
                )}
              </div>
            </div>
            </div>

            {/* Floating Chat Button */}
            {!isChatOpen && selectedEntryIds.length > 0 && Object.keys(editingEntries).length === 0 && (
               <button 
                  onClick={() => setIsChatOpen(true)} 
                  className="absolute bottom-6 right-6 bg-indigo-600 text-white shadow-xl hover:bg-indigo-700 transition-all rounded-full h-14 px-6 font-bold flex items-center gap-3 z-40"
               >
                  <i className="fa-solid fa-messages"></i> Chat ({selectedEntryIds.length})
               </button>
            )}

            {/* CHAT AREA */}
            {isChatOpen && Object.keys(editingEntries).length === 0 && (
              <div className="border-t min-[1500px]:border-t-0 min-[1500px]:border-l border-slate-200 dark:border-slate-800 bg-slate-100 dark:bg-slate-900 min-[1500px]:w-[400px] flex flex-col flex-shrink-0 h-[50vh] min-[1500px]:h-full transition-all absolute min-[1500px]:relative bottom-0 left-0 right-0 z-30 shadow-2xl min-[1500px]:shadow-none">
                 <div className="flex justify-between items-center bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-4 py-3 shrink-0">
                    <h3 className="font-bold text-slate-800 dark:text-slate-200 text-sm"><i className="fa-solid fa-sparkles text-indigo-600 dark:text-indigo-400 mr-2"></i> Document Chat</h3>
                    <button onClick={() => setIsChatOpen(false)} className="text-slate-400 hover:text-slate-700 dark:hover:text-slate-300"><i className="fa-solid fa-xmark text-lg"></i></button>
                 </div>
                 
                 <div ref={chatScrollRef} className="flex-1 overflow-y-auto px-4 pb-4 pt-4 space-y-4">
                    {chats[currentChatKey]?.map((msg, idx) => (
                      <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                        {msg.role === 'user' ? (
                          <div className="max-w-[90%] rounded-2xl px-4 py-2 text-base bg-indigo-600 text-white rounded-br-none whitespace-pre-wrap">
                            {msg.text}
                          </div>
                        ) : (
                          <div 
                            className="max-w-[90%] rounded-2xl px-4 py-3 text-base bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200 rounded-bl-none shadow-sm prose prose-slate dark:prose-invert max-w-none prose-p:my-1 prose-headings:my-2 prose-ul:my-1 prose-li:my-0 prose-a:text-indigo-600 dark:prose-a:text-indigo-400"
                            dangerouslySetInnerHTML={{ __html: injectReferences(parseMarkdown(msg.text), entries) }}
                          />
                        )}
                      </div>
                    ))}
                    {isChatting && <div className="text-slate-400 dark:text-slate-500 text-base italic ml-2"><i className="fa-solid fa-circle-notch fa-spin mr-2"></i>AI is processing...</div>}
                 </div>

                 <form onSubmit={handleSendMessage} className="p-4 bg-slate-100 dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 relative shrink-0">
                    <input type="text" value={chatInput} onChange={(e) => setChatInput(e.target.value)} placeholder="Ask about selected documents..." className="w-full pl-4 pr-12 py-3 text-base border border-slate-300 dark:border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white dark:bg-slate-800 dark:text-white shadow-sm" />
                    <button type="submit" disabled={isChatting} className="absolute right-6 top-6 text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 disabled:opacity-50"><i className="fa-solid fa-paper-plane"></i></button>
                 </form>
              </div>
            )}

            {hoveredRef && (() => {
              const refEntry = entries.find(e => e.id === hoveredRef.id);
              if (!refEntry) return null;
              return (
                <div 
                  className="fixed z-[100] bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-xl rounded-xl p-4 w-72 pointer-events-none transform -translate-x-1/2 -translate-y-full"
                  style={{ top: hoveredRef.y - 10, left: hoveredRef.x }}
                >
                   <h4 className="font-bold text-slate-800 dark:text-slate-100 text-sm mb-1 line-clamp-2">{refEntry.title}</h4>
                   <p className="text-xs text-slate-500 dark:text-slate-400">{refEntry.summary || 'No summary available.'}</p>
                </div>
              );
            })()}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<KnowledgeApp />);
  </script>
</body>
</html>
