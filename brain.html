  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const APP_VERSION = "v1.6.6";

    const isMediaSource = (url) => {
          {/* RIGHT PANEL - ENTRY CONTENT VIEW */}
          {/* 1. Change the main wrapper to use bg-slate-50 (or your list's background color) */}
          <div className="flex-1 flex flex-col bg-slate-50 overflow-hidden h-full">
            
            {/* 2. Add padding to create the margins on the outside */}
            <div className="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8">
              
              {/* 3. Wrap your existing content in this new "Large Card" container */}
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 max-w-5xl mx-auto min-h-full flex flex-col overflow-hidden">
                
                {/* YOUR EXISTING ENTRY CONTENT GOES HERE */}
                {/* (You may need to remove any old 'bg-white' or 'h-full' classes from your immediate inner content if they conflict) */}
                
                let typeBorder = 'border-slate-300';
                let selectedBg = 'bg-slate-300';
                let isDarkBg = false;

                if (isCombined) { typeBorder = 'border-purple-600'; selectedBg = 'bg-purple-600'; isDarkBg = true; }
                else if (isPdf) { typeBorder = 'border-blue-600'; selectedBg = 'bg-blue-600'; isDarkBg = true; }
                else if (isMedia) { typeBorder = 'border-red-600'; selectedBg = 'bg-red-600'; isDarkBg = true; }
                else if (isManual) { typeBorder = 'border-yellow-500'; selectedBg = 'bg-yellow-500'; isDarkBg = false; }
                
                const bgClass = isSelected ? selectedBg : 'bg-white';
                const shadowClass = isSelected ? 'shadow-md' : 'shadow-sm hover:shadow-md';
                
                const titleText = isSelected ? (isDarkBg ? 'text-white' : 'text-slate-900') : 'text-slate-800';
                const idText = isSelected ? (isDarkBg ? 'text-white/70' : 'text-slate-600') : 'text-slate-400';
                const summaryText = isSelected ? (isDarkBg ? 'text-white/90' : 'text-slate-700') : 'text-slate-500';
                const pinActiveColor = isSelected ? (isDarkBg ? 'text-white' : 'text-slate-900') : 'text-indigo-700';
                const pinInactiveColor = isSelected ? (isDarkBg ? 'text-white' : 'text-slate-700') : 'text-slate-500';
                const catClasses = isSelected 
                  ? (isDarkBg ? 'bg-white/20 text-white border-white/30' : 'bg-black/10 text-slate-800 border-black/20')
                  : 'bg-indigo-50 text-indigo-600 border-indigo-100';
                
                return (
                  <div 
                    key={entry.id} 
                    draggable
                    onDragStart={(e) => {
                      e.dataTransfer.setData('kb-ref-id', entry.id);
                      e.dataTransfer.setData('text/plain', `[[kb-ref:${entry.id}]]`);
                    }}
                    onClick={(e) => handleEntryClick(e, entry.id)} 
                    onDragOver={(e) => { e.preventDefault(); setDragOverEntryId(entry.id); }}
                    onDragLeave={() => setDragOverEntryId(null)}
                    onDrop={(e) => handleEntryDrop(e, entry.id)}
                    className={`relative p-4 rounded-xl cursor-pointer transition-all group border-[3px] ${typeBorder} ${bgClass} ${shadowClass} ${dragOverEntryId === entry.id ? 'opacity-80 scale-[0.98]' : ''}`}
                  >
                    <button onClick={(e) => togglePin(e, entry.id)} className={`absolute top-3 right-3 transition-all duration-200 z-10 ${isPinned ? `${pinActiveColor} opacity-100` : `${pinInactiveColor} opacity-0 group-hover:opacity-40 hover:!opacity-100`}`}>
                      <i className="fa-solid fa-thumbtack"></i>
                    </button>
                    <h4 className={`text-sm font-semibold mb-1 pr-6 line-clamp-2 ${titleText}`}>
                      <span className={`font-normal mr-1 ${idText}`}>{entry.numericId}:</span>
                      {entry.title}
                    </h4>
                    
                    {Array.isArray(entry.categories) && entry.categories.length > 0 && (
                      <div className="flex flex-wrap gap-1 mb-2 mt-1.5">
                        {entry.categories.map(c => (
                          <span 
                            key={c} 
                            draggable
                            onDragStart={(e) => {
                              e.stopPropagation();
                              e.dataTransfer.setData('kb-tax', JSON.stringify({ type: 'cat', val: c }));
                              e.dataTransfer.setData('kb-tax-remove', JSON.stringify({ entryId: entry.id, type: 'cat', val: c }));
                              e.dataTransfer.effectAllowed = 'copyMove';
                            }}
                            onDragEnd={(e) => {
                              if (e.dataTransfer.dropEffect === 'none') {
                                removeTaxonomyFromEntry(entry.id, 'cat', c);
                              }
                            }}
                            className={`px-2 py-0.5 rounded-full text-[10px] font-medium lowercase border shadow-sm cursor-grab active:cursor-grabbing ${catClasses}`}
                            title="Drag to another card, or drag away to remove"
                          >
                            {c}
                          </span>
                        ))}
                      </div>
                    )}

                    {isCombined ? (
                      <div className="mt-2 space-y-1">
                        {entry.referencedIds?.slice(0, 3).map(id => {
                          const ref = entries.find(e => e.id === id);
                          return ref ? <div key={id} className={`text-xs truncate border-l-2 pl-1.5 ${isSelected ? (isDarkBg ? 'text-white/90 border-white/50' : 'text-slate-800 border-slate-400') : 'text-rose-800 border-rose-400'}`}>{ref.numericId}: {ref.title}</div> : null;
                        })}
                        {entry.referencedIds?.length > 3 && <div className={`text-xs opacity-70 italic ${isSelected ? (isDarkBg ? 'text-white' : 'text-slate-800') : 'text-rose-800'}`}>+{entry.referencedIds.length - 3} more notes</div>}
                      </div>
                    ) : (
                      <p className={`text-xs line-clamp-2 mb-2 ${summaryText}`}>{entry.summary}</p>
                    )}
                  </div>
                );
              })}
            </div>
